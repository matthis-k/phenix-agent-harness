name: Fix PR 24 import order

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'feat/session-subagent-adapter' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Organize imports
        shell: python
        run: |
          from pathlib import Path

          adapter = Path("modules/phenix-pi/extensions/phenix-runtime/session-subagent-adapter.ts")
          text = adapter.read_text()
          old = '''import type { SubagentRequest } from "./subagent-api.ts";
          import {
            ChildRuntimeError,
            type ChildRun,
            type ChildSessionEvent,
            type ChildSessionNode,
          } from "./child-session-types.ts";
          '''
          new = '''import {
            type ChildRun,
            ChildRuntimeError,
            type ChildSessionEvent,
            type ChildSessionNode,
          } from "./child-session-types.ts";
          import type { SubagentRequest } from "./subagent-api.ts";
          '''
          if text.count(old) != 1:
              raise RuntimeError("expected one adapter import block")
          adapter.write_text(text.replace(old, new))

          test = Path("modules/phenix-pi/tests/session-subagent-adapter.test.ts")
          text = test.read_text()
          old = '''import { agentClientRef } from "../extensions/phenix-kernel/refs.ts";
          import {
            createSessionSubagentExecutionAdapter,
            createSubagentManager,
            returns,
            routing,
            type CompiledSubagentExecution,
            type SubagentExecutionCompiler,
            SubagentExecutionError,
            type SubagentRequest,
            type SubagentSessionSpawner,
          } from "../extensions/phenix-runtime/index.ts";
          import {
            childRunId,
            type ChildCycleOutcome,
            type ChildRun,
            type ChildSessionEvent,
            type ChildSessionNode,
          } from "../extensions/phenix-runtime/child-session-types.ts";
          '''
          new = '''import { agentClientRef } from "../extensions/phenix-kernel/refs.ts";
          import {
            type ChildCycleOutcome,
            type ChildRun,
            type ChildSessionEvent,
            type ChildSessionNode,
            childRunId,
          } from "../extensions/phenix-runtime/child-session-types.ts";
          import {
            type CompiledSubagentExecution,
            createSessionSubagentExecutionAdapter,
            createSubagentManager,
            returns,
            routing,
            type SubagentExecutionCompiler,
            SubagentExecutionError,
            type SubagentRequest,
            type SubagentSessionSpawner,
          } from "../extensions/phenix-runtime/index.ts";
          '''
          if text.count(old) != 1:
              raise RuntimeError("expected one adapter test import block")
          test.write_text(text.replace(old, new))

      - name: Commit fix
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi/extensions/phenix-runtime/session-subagent-adapter.ts \
            modules/phenix-pi/tests/session-subagent-adapter.test.ts
          git commit -m "style(runtime): organize session adapter imports"
          git push origin HEAD:${{ github.head_ref }}
