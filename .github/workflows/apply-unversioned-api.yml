name: Apply unversioned Phenix API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove API versioning
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/remove-api-versioning.py

          python3 <<'PY'
          from pathlib import Path
          import subprocess

          allowed = {
              "modules/phenix-pi/extensions/phenix-composition/root-workflow-integration.ts",
              "modules/phenix-pi/extensions/phenix-kernel/api-version.ts",
              "modules/phenix-pi/extensions/phenix-routing/types.ts",
              "modules/phenix-pi/extensions/phenix-subagents/child-spec.ts",
              "modules/phenix-pi/extensions/phenix-subagents/contract-codec.ts",
              "modules/phenix-pi/extensions/phenix-subagents/contract-projection.ts",
              "modules/phenix-pi/extensions/phenix-subagents/contract-store.ts",
              "modules/phenix-pi/extensions/phenix-subagents/contract.ts",
              "modules/phenix-pi/extensions/phenix-subagents/delegation-policy.ts",
              "modules/phenix-pi/extensions/phenix-subagents/handle-store.ts",
              "modules/phenix-pi/extensions/phenix-subagents/handle-types.ts",
              "modules/phenix-pi/extensions/phenix-subagents/producer-contract.ts",
              "modules/phenix-pi/extensions/phenix-subagents/tool-policy.ts",
              "modules/phenix-pi/extensions/phenix-subagents/workflow-delegator.ts",
              "modules/phenix-pi/extensions/phenix-workflow/agent-capabilities.ts",
              "modules/phenix-pi/extensions/phenix-workflow/session-registry.ts",
              "modules/phenix-pi/extensions/phenix-workflow/workflow-definitions.ts",
              "modules/phenix-pi/extensions/phenix-workflow/workflow-runtime.ts",
              "modules/phenix-pi/extensions/phenix-workflow/workflow-store.ts",
              "modules/phenix-pi/extensions/phenix-workflow/workflow-types.ts",
              "modules/phenix-pi/runtime/verify.mjs",
              "modules/phenix-pi/tests/contract-store.test.ts",
              "modules/phenix-pi/tests/contract-tool-isolation.test.ts",
              "modules/phenix-pi/tests/contract.test.ts",
              "modules/phenix-pi/tests/execution-quality-service.test.ts",
              "modules/phenix-pi/tests/handle-schema.test.ts",
              "modules/phenix-pi/tests/managed-delegation-runtime.test.ts",
              "modules/phenix-pi/tests/persistence-json-files.test.ts",
              "modules/phenix-pi/tests/production-subagent-manager.test.ts",
              "modules/phenix-pi/tests/runtime-finalization.test.ts",
              "modules/phenix-pi/tests/session-isolation.test.ts",
              "modules/phenix-pi/tests/workflow-decision-context.test.ts",
          }

          changed = subprocess.check_output(
              ["git", "diff", "--name-only", "--", "modules/phenix-pi"],
              text=True,
          ).splitlines()
          for relative in changed:
              if relative in allowed:
                  continue
              content = subprocess.check_output(["git", "show", f"HEAD:{relative}"])
              path = Path(relative)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(content)
          PY

          rm -f \
            .github/scripts/remove-api-versioning.py \
            .github/workflows/apply-unversioned-api.yml \
            .github/workflows/audit-unversioned-api.yml

      - name: Format focused source diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' changed_sources < <(
            git diff --name-only -z --diff-filter=ACMR -- modules/phenix-pi \
              | while IFS= read -r -d '' path; do
                  case "$path" in
                    *.ts|*.mjs) printf '%s\0' "$path" ;;
                  esac
                done
          )
          if (( ${#changed_sources[@]} > 0 )); then
            nix develop --command biome check --write --unsafe "${changed_sources[@]}"
          fi

      - name: Commit candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --no-verify -m "refactor(api): remove API versioning"

      - name: Reject versioned Phenix envelopes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path("modules/phenix-pi")
          pattern = re.compile(
              r"PHENIX_API_VERSION|schemaVersion|definitionVersion|presetRevision|"
              r"HANDLE_VERSION|CONTRACT_SCHEMA_VERSION|CONTRACT_RESULT_SCHEMA_VERSION|"
              r"readonly version:|version:\s*(?:[0-9]+|PHENIX_API_VERSION)|"
              r"contract artifact \(v[0-9]+\)|unsupported version"
          )
          findings = []
          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.name == "package-lock.json":
                  continue
              try:
                  lines = path.read_text().splitlines()
              except UnicodeDecodeError:
                  continue
              for line_number, line in enumerate(lines, 1):
                  if pattern.search(line):
                      findings.append(f"{path}:{line_number}:{line}")
          if findings:
              raise SystemExit("\n".join(findings))
          PY

      - name: Run Tend CI profile
        id: tend
        shell: bash
        run: |
          set +e
          nix develop --command tend check \
            --profile ci \
            --context ci \
            --base HEAD^ \
            --head HEAD \
            > tend-unversioned.log 2>&1
          status=$?
          cat tend-unversioned.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Tend diagnostics
        if: steps.tend.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: tend-unversioned-diagnostics
          path: tend-unversioned.log
          if-no-files-found: error

      - name: Fail when Tend checks fail
        if: steps.tend.outputs.status != '0'
        run: exit 1

      - name: Push validated change
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
