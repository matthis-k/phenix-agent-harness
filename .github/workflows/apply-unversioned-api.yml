name: Apply unversioned Phenix API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Remove API versioning
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/remove-api-versioning.py
          rm -f \
            .github/scripts/remove-api-versioning.py \
            .github/workflows/apply-unversioned-api.yml \
            .github/workflows/audit-unversioned-api.yml

      - name: Commit candidate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(api): remove API versioning"

      - name: Reject versioned Phenix envelopes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path("modules/phenix-pi")
          pattern = re.compile(
              r"PHENIX_API_VERSION|schemaVersion|definitionVersion|presetRevision|"
              r"HANDLE_VERSION|CONTRACT_SCHEMA_VERSION|CONTRACT_RESULT_SCHEMA_VERSION|"
              r"readonly version:|version:\s*(?:[0-9]+|PHENIX_API_VERSION)|"
              r"contract artifact \(v[0-9]+\)|unsupported version"
          )
          findings = []
          for path in sorted(root.rglob("*")):
              if not path.is_file() or path.name == "package-lock.json":
                  continue
              try:
                  lines = path.read_text().splitlines()
              except UnicodeDecodeError:
                  continue
              for line_number, line in enumerate(lines, 1):
                  if pattern.search(line):
                      findings.append(f"{path}:{line_number}:{line}")
          if findings:
              raise SystemExit("\n".join(findings))
          PY

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tend CI profile
        id: tend
        shell: bash
        run: |
          set +e
          nix develop --command tend check \
            --profile ci \
            --context ci \
            --base HEAD^ \
            --head HEAD \
            > tend-unversioned.log 2>&1
          status=$?
          cat tend-unversioned.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Tend diagnostics
        if: steps.tend.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: tend-unversioned-diagnostics
          path: tend-unversioned.log
          if-no-files-found: error

      - name: Fail when Tend checks fail
        if: steps.tend.outputs.status != '0'
        run: exit 1

      - name: Push validated change
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
