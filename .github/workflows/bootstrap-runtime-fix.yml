name: Bootstrap runtime finalization fix

on:
  push:
    branches:
      - fix/runtime-workflow-finalization
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[runtime-fix-applied]')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out branch
        uses: actions/checkout@v5
        with:
          ref: fix/runtime-workflow-finalization
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply reviewed runtime changes
        id: apply
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            python3 .github/bootstrap/apply-exact-patch.py \
              .github/bootstrap/runtime-finalization.patch
            sed '7,8d' .github/bootstrap/apply-runtime-fix.sh | bash
            git add -A
            git diff --cached --check
            git diff --cached --binary > candidate.diff
          ) > bootstrap-apply.log 2>&1
          status=$?
          cat bootstrap-apply.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload bootstrap diagnostics
        if: steps.apply.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-apply-diagnostics
          path: |
            bootstrap-apply.log
            candidate.diff
          if-no-files-found: error

      - name: Fail when bootstrap application failed
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Run complete repository checks
        id: checks
        if: steps.apply.outputs.status == '0'
        shell: bash
        run: |
          set +e
          nix flake check --print-build-logs > nix-check.log 2>&1
          status=$?
          cat nix-check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Nix diagnostics
        if: steps.apply.outputs.status == '0' && steps.checks.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: nix-check-diagnostics
          path: |
            nix-check.log
            candidate.diff
          if-no-files-found: error

      - name: Fail when repository checks failed
        if: steps.apply.outputs.status == '0' && steps.checks.outputs.status != '0'
        run: exit 1

      - name: Commit verified result
        id: commit
        if: steps.apply.outputs.status == '0' && steps.checks.outputs.status == '0'
        shell: bash
        run: |
          set +e
          (
            set -euo pipefail
            rm -rf .github/bootstrap .github/workflows/bootstrap-runtime-fix.yml
            rm -f .github/workflows/ci.yml
            rm -f bootstrap-apply.log candidate.diff nix-check.log commit-result.log
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git diff --cached --check
            git commit -m "fix(runtime): preserve cancellation and finalize workflows [runtime-fix-applied]"
            git push origin HEAD:fix/runtime-workflow-finalization
          ) > /tmp/commit-result.log 2>&1
          status=$?
          cat /tmp/commit-result.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload commit diagnostics
        if: steps.commit.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: commit-diagnostics
          path: /tmp/commit-result.log
          if-no-files-found: error

      - name: Fail when committing verified result failed
        if: steps.commit.outputs.status != '0'
        run: exit 1
