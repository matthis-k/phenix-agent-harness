name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Deterministic checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check changed files without modifying them
        shell: bash
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "$zero_sha" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            base="${{ github.sha }}^"
            head="${{ github.sha }}"
          fi

          nix run .#phenix-check -- range "$base" "$head"

      - name: Run complete flake checks
        id: checks
        shell: bash
        run: |
          set +e
          nix flake check --print-build-logs --keep-going > flake-check.log 2>&1
          status=$?
          cat flake-check.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload flake diagnostics
        if: steps.checks.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: flake-check-diagnostics
          path: flake-check.log
          if-no-files-found: error

      - name: Fail when flake checks fail
        if: steps.checks.outputs.status != '0'
        run: exit 1
