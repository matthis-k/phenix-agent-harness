name: Apply auto dispatch guidance

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Apply auto dispatch guidance
        shell: bash
        run: |
          awk '/^          python - <<'"'"'PY'"'"'$/ { capture=1; next } /^          PY$/ { capture=0 } capture { sub(/^          /, ""); print }' \
            .github/workflows/patch-auto-dispatch-guidance.yml > /tmp/auto-dispatch-guidance.py
          python /tmp/auto-dispatch-guidance.py
      - name: Format changed source
        run: |
          nix shell github:NixOS/nixpkgs/0bb7ec54c8483066ec9d7720e780a5caa71f8612#biome -c \
            biome check --write --unsafe --config-path biome.json --no-errors-on-unmatched \
            --files-ignore-unknown=true \
            modules/phenix-pi/extension/root-extension.ts \
            modules/phenix-pi/application/agent-tools.ts \
            modules/phenix-pi/tests/root-extension-session.test.ts
      - name: Commit guidance changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: require catalog selection in auto mode"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
