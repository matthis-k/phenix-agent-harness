name: Refresh Pi npm fixed-output hash

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out type branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/05-types-and-identifiers
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Refresh fixed-output hash
        run: nix run .#update-pi-npm-hash

      - name: Commit updated pin
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/pi-packages.nix
          git diff --cached --check
          git commit -m "build(npm): refresh Pi package fixed-output hash"
          git push origin HEAD:qa/05-types-and-identifiers
