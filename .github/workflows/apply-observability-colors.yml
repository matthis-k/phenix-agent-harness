name: Apply observability colors

on:
  push:
    branches:
      - feat/color-coded-observability
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.head_ref == 'feat/color-coded-observability')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: feat/color-coded-observability
          fetch-depth: 0
      - name: Patch root status rendering
        shell: python
        run: |
          from pathlib import Path

          path = Path("modules/phenix-pi/extension/root-extension.ts")
          text = path.read_text()

          old_import = 'import { completePhenixSubcommands, PHENIX_FACTS_USAGE, PHENIX_USAGE } from "./phenix-command.ts";\nimport { RunMonitor } from "./run-monitor.ts";'
          new_import = 'import { completePhenixSubcommands, PHENIX_FACTS_USAGE, PHENIX_USAGE } from "./phenix-command.ts";\nimport { statusField, statusLine } from "./observability-theme.ts";\nimport { RunMonitor } from "./run-monitor.ts";'
          if old_import not in text:
              raise SystemExit("root-extension import anchor not found")
          text = text.replace(old_import, new_import, 1)

          old_report = '''      ctx.ui.notify(
        `Root: ${activeRoot}\\nProfile: ${profile.agent} / ${profile.modelSet} / ${profile.difficulty}\\nSequence: ${activeRuntime.sequence(activeRoot)}\\nActive descendants: ${descendants.length}\\nFacts: ${facts.length}\\nLive view: ${monitor?.currentMode ?? "hidden"}\\nIntegrations: ${summarizeIntegrations(integrationStatuses)}\\nLedger: ${ledger}`,
        integrationLevel(integrationStatuses),
      );'''
          new_report = '''      const failedIntegrations = integrationStatuses.some((status) => status.state === "failed");
      const liveMode = monitor?.currentMode ?? "hidden";
      ctx.ui.notify(
        [
          statusField(ctx.ui.theme, "Root", String(activeRoot), "muted"),
          statusField(
            ctx.ui.theme,
            "Profile",
            `${profile.agent} / ${profile.modelSet} / ${profile.difficulty}`,
            "accent",
          ),
          statusField(
            ctx.ui.theme,
            "Sequence",
            String(activeRuntime.sequence(activeRoot)),
            "muted",
          ),
          statusField(
            ctx.ui.theme,
            "Active descendants",
            String(descendants.length),
            descendants.length === 0 ? "success" : "warning",
          ),
          statusField(ctx.ui.theme, "Facts", String(facts.length)),
          statusField(
            ctx.ui.theme,
            "Live view",
            liveMode,
            liveMode === "hidden" ? "muted" : "accent",
          ),
          statusField(
            ctx.ui.theme,
            "Integrations",
            summarizeIntegrations(integrationStatuses),
            failedIntegrations ? "error" : "success",
          ),
          statusField(ctx.ui.theme, "Ledger", ledger, "muted"),
        ].join("\\n"),
        integrationLevel(integrationStatuses),
      );'''
          if old_report not in text:
              raise SystemExit("status report anchor not found")
          text = text.replace(old_report, new_report, 1)

          old_footer = '''  ctx.ui.setStatus(
    STATUS_KEY,
    `phenix: ${profile.agent}/${profile.modelSet}${descendants.length === 0 ? "" : ` · ${descendants.length} active`}`,
  );'''
          new_footer = '''  ctx.ui.setStatus(STATUS_KEY, statusLine(ctx.ui.theme, profile, descendants.length));'''
          if old_footer not in text:
              raise SystemExit("footer status anchor not found")
          text = text.replace(old_footer, new_footer, 1)

          path.write_text(text)
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi/extension/root-extension.ts
          git diff --cached --quiet && exit 0
          git commit -m "Color code Phenix status displays"
          git push origin HEAD:feat/color-coded-observability
