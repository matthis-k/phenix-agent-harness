name: Export PR source

on:
  pull_request:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/upload-artifact@v4
        with:
          name: pr-source
          path: .
          include-hidden-files: true
