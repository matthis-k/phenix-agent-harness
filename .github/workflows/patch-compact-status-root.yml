name: Patch compact status dispatcher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'cleanup/compact-status-dashboard' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4.2.2
        with:
          ref: cleanup/compact-status-dashboard
          fetch-depth: 0
      - name: Remove the runs dispatcher alias
        shell: python
        run: |
          from pathlib import Path

          path = Path("modules/phenix-pi/extension/root-extension.ts")
          text = path.read_text()
          old = '      if (action !== "status" && action !== "runs") {'
          new = '      if (action !== "status") {'
          if old not in text:
              raise SystemExit("status dispatcher alias anchor not found")
          path.write_text(text.replace(old, new, 1))
          Path(".github/workflows/patch-compact-status-root.yml").unlink()
      - name: Commit dispatcher cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi/extension/root-extension.ts .github/workflows/patch-compact-status-root.yml
          git commit -m "Remove the runs dispatcher alias"
          git push origin HEAD:cleanup/compact-status-dashboard
