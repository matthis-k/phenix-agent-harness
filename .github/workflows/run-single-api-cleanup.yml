name: Run staged single API cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Execute staged transformation
        id: transform
        shell: bash
        run: |
          set +e
          python3 > cleanup-error.log 2>&1 <<'PY'
          from pathlib import Path
          import re

          workflow = Path('.github/workflows/apply-single-api-cleanup.yml').read_text()
          marker = "          python3 <<'PY'\n"
          body = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          body = "\n".join(line[10:] if line.startswith("          ") else line for line in body.splitlines())
          body = "\n".join(
              line for line in body.splitlines()
              if "Expected ${CONTRACT_SCHEMA_VERSION}" not in line
          )
          body = body.replace(
              "replace(p, 'definitionVersion: 1,', 'definitionVersion: PHENIX_API_VERSION,')",
              "replace(p, 'definitionVersion: 1,', 'definitionVersion: PHENIX_API_VERSION,', expected=2)",
              1,
          )
          exec(compile(body, 'staged-single-api-cleanup.py', 'exec'))

          codec_path = Path('modules/phenix-pi/extensions/phenix-subagents/contract-codec.ts')
          codec = codec_path.read_text()
          codec, count = re.subn(
              r'`Expected \$\{CONTRACT_SCHEMA_VERSION\}\. This runtime does not support migration\. ` \+\n\s*`Delete \.phenix-agent-state if it contains stale development artifacts\.`,',
              '`Expected ${PHENIX_API_VERSION}. Remove stale .phenix-agent-state artifacts before retrying.`,',
              codec,
          )
          if count != 1:
              raise RuntimeError(f'contract codec version message matches={count}')
          codec_path.write_text(codec)
          PY
          status=$?
          cat cleanup-error.log
          exit "$status"
      - name: Upload transformation failure
        if: failure() && steps.transform.conclusion == 'failure'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: cleanup-error
          path: cleanup-error.log
          if-no-files-found: error
      - name: Commit transformation
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -f cleanup-error.log .github/workflows/run-single-api-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(api): keep only the current Phenix API"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Reject stale API references
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'phenix_delegate|phenix_create_subagent|phenix_contract_get|phenix_contract_submit|\bv[1-9][0-9]*\b|version [2-9][0-9]*' \
            --exclude='flake.lock' --exclude='package-lock.json' --exclude-dir='.git' .; then
            echo 'Stale Phenix API reference found.' >&2
            exit 1
          fi
      - name: Install Nix
        if: success()
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Tend CI profile
        if: success()
        shell: bash
        run: |
          nix develop --command tend check \
            --profile ci \
            --context ci \
            --base HEAD^ \
            --head HEAD
