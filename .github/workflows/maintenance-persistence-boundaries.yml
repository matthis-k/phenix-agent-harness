name: Apply persistence boundary cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out persistence branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/08-persistence-boundaries
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply persistence migration
        run: |
          python .github/maintenance/migrate-persistence.py
          python .github/maintenance/finalize-persistence-migration.py

      - name: Format touched TypeScript
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix-persistence/json-files.ts \
            modules/phenix-pi/extensions/phenix-subagents/contract-store.ts \
            modules/phenix-pi/extensions/phenix-subagents/handle-store.ts \
            modules/phenix-pi/extensions/phenix-workflow/index.ts \
            modules/phenix-pi/extensions/phenix-workflow/workflow-store.ts \
            modules/phenix-pi/tests/persistence-json-files.test.ts \
            modules/phenix-pi/tests/workflow-store.test.ts

      - name: Commit source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi
          git diff --cached --check
          git commit -m "refactor(persistence): centralize atomic JSON boundaries"
          git push origin HEAD:qa/08-persistence-boundaries
