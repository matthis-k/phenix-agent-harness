name: Run Pi 0.80.10 upgrade

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    if: github.head_ref == 'fix/upgrade-pi-0.80.10'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: fix/upgrade-pi-0.80.10
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Generate and verify package
        run: bash scripts/upgrade-pi-0.80.10.sh
