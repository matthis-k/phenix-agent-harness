name: Audit unversioned Phenix API

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Collect version references
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('modules/phenix-pi')
          pattern = re.compile(
              r'PHENIX_API_VERSION|schemaVersion|definitionVersion|presetRevision|'
              r'HANDLE_VERSION|CONTRACT_SCHEMA_VERSION|CONTRACT_RESULT_SCHEMA_VERSION|'
              r'readonly version:|version:\s*(?:PHENIX_API_VERSION|[0-9]+)'
          )
          results = []
          for path in sorted(root.rglob('*')):
              if not path.is_file() or path.name == 'package-lock.json':
                  continue
              try:
                  lines = path.read_text().splitlines()
              except UnicodeDecodeError:
                  continue
              for number, line in enumerate(lines, 1):
                  if pattern.search(line):
                      results.append(f'{path}:{number}:{line}')
          Path('version-references.txt').write_text('\n'.join(results) + ('\n' if results else ''))
          print('\n'.join(results))
          PY
      - uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: version-references
          path: version-references.txt
          if-no-files-found: error
