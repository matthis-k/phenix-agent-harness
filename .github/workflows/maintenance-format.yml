name: Normalize runtime lifecycle changes

on:
  push:
    branches:
      - qa/01-runtime-lifecycle

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out maintenance branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply deterministic TypeScript fixes
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix.ts \
            modules/phenix-pi/extensions/phenix-composition/runtime-policy.ts \
            modules/phenix-pi/extensions/phenix-workflow/workflow-runtime.ts \
            modules/phenix-pi/extensions/phenix-subagents/handle-types.ts \
            modules/phenix-pi/extensions/phenix-subagents/coordinator.ts \
            modules/phenix-pi/tests/runtime-finalization.test.ts

      - name: Remove maintenance workflow and commit
        run: |
          rm -f .github/workflows/maintenance-format.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style: normalize runtime lifecycle changes"
          git push origin HEAD:qa/01-runtime-lifecycle
