          cat > modules/phenix-pi/packages/phenix-suite/runtime/workflow-action-schema.ts <<'EOF'
          import { type Static, Type } from "typebox";

          const WorkflowRequirementsInput = Type.Union([
            Type.Array(Type.String({ minLength: 1 }), {
              maxItems: 64,
              description: "Bounded requirements for the delegated assignment.",
            }),
            Type.String({
              minLength: 1,
              description:
                "One requirement, or a JSON-encoded string array when the model transport cannot preserve arrays.",
            }),
          ]);

          const WorkflowInspectAction = Type.Object(
            {
              action: Type.Literal("inspect", {
                description:
                  "Return the current contract-bound workflow authority and the target agents that may be spawned.",
              }),
            },
            { additionalProperties: false },
          );

          const WorkflowSpawnAction = Type.Object(
            {
              action: Type.Literal("spawn", {
                description: "Spawn one target agent permitted by the current contract-bound workflow node.",
              }),
              agent: Type.String({
                minLength: 1,
                description: "A target agent identity advertised in the current workflow authority snapshot.",
              }),
              task: Type.String({
                minLength: 1,
                description: "The bounded objective for the target agent.",
              }),
              requirements: Type.Optional(WorkflowRequirementsInput),
              mode: Type.Optional(Type.Union([Type.Literal("await"), Type.Literal("background")])),
            },
            { additionalProperties: false },
          );

          export const DirectSubagentParams = Type.Object(
            {
              agent: Type.Optional(
                Type.String({
                  minLength: 1,
                  description:
                    "An advertised target agent. May be omitted only when exactly one target is currently legal.",
                }),
              ),
              task: Type.String({
                minLength: 1,
                description: "The bounded objective for the target agent.",
              }),
              requirements: Type.Optional(WorkflowRequirementsInput),
              mode: Type.Optional(Type.Union([Type.Literal("await"), Type.Literal("background")])),
            },
            { additionalProperties: false },
          );

          /**
           * Model-facing workflow action.
           *
           * The current node and actor authority are derived from the active root session
           * or child contract. The model may inspect that derived authority or state only
           * its spawn intent: one advertised target agent and a bounded assignment.
           */
          export const WorkflowActionParams = Type.Union([WorkflowInspectAction, WorkflowSpawnAction]);

          export type WorkflowActionParamsType = Static<typeof WorkflowActionParams>;
          export type DirectSubagentParamsType = Static<typeof DirectSubagentParams>;

          /** Normalize arrays and common model-transport string encodings into one stable list. */
          export function normalizeWorkflowRequirements(
            value: readonly string[] | string | undefined,
          ): string[] | undefined {
            if (value === undefined) return undefined;

            const normalize = (items: readonly string[]): string[] => {
              const requirements = items.map((item) => item.trim()).filter((item) => item.length > 0);
              if (requirements.length > 64) {
                throw new TypeError("Workflow requirements may contain at most 64 entries.");
              }
              return requirements.length > 0 ? requirements : [];
            };

            if (Array.isArray(value)) return normalize(value);

            const encoded = value.trim();
            if (encoded.startsWith("[")) {
              let parsed: unknown;
              try {
                parsed = JSON.parse(encoded);
              } catch (error) {
                throw new TypeError(
                  `Workflow requirements looked like a JSON array but could not be parsed: ${
                    error instanceof Error ? error.message : String(error)
                  }`,
                );
              }
              if (!Array.isArray(parsed) || parsed.some((item) => typeof item !== "string")) {
                throw new TypeError("Workflow requirements JSON must be an array of strings.");
              }
              return normalize(parsed);
            }

            return normalize([encoded]);
          }
          EOF

          cat > modules/phenix-pi/packages/phenix-suite/runtime/workflow-api-tools.ts <<'EOF'
          /** Model-facing adapters for authority-bound workflow and subagent execution. */

          import type { AgentToolResult } from "@earendil-works/pi-agent-core";
          import type { ExtensionContext, ToolDefinition } from "@earendil-works/pi-coding-agent";

          import {
            DirectSubagentParams,
            type DirectSubagentParamsType,
            normalizeWorkflowRequirements,
            WorkflowActionParams,
            type WorkflowActionParamsType,
          } from "./workflow-action-schema.ts";
          import type { ParentExecutionContext } from "./workflow-api-types.ts";
          import type {
            WorkflowAuthoritySnapshot,
            WorkflowHandleResult,
            WorkflowRuntimePort,
          } from "./workflow-runtime-types.ts";

          export const PHENIX_WORKFLOW_TOOL = "phenix_workflow" as const;
          export const PHENIX_SUBAGENT_TOOL = "phenix_subagent" as const;
          export type WorkflowApiToolName =
            | typeof PHENIX_WORKFLOW_TOOL
            | typeof PHENIX_SUBAGENT_TOOL;

          export interface WorkflowApiToolAuthorizationInput {
            readonly ctx: ExtensionContext;
            readonly tool: WorkflowApiToolName;
          }

          export type WorkflowApiToolAuthorizer = (
            input: WorkflowApiToolAuthorizationInput,
          ) => string | undefined;

          function result(payload: Record<string, unknown>): AgentToolResult<Record<string, unknown>> {
            return {
              content: [{ type: "text", text: JSON.stringify(payload, null, 2) }],
              details: payload,
            };
          }

          function errorResult(
            message: string,
            details?: Record<string, unknown>,
          ): AgentToolResult<Record<string, unknown>> {
            return {
              content: [{ type: "text", text: message }],
              isError: true,
              details: details ?? { status: "failed" },
            };
          }

          function authorizationResult(input: {
            readonly authorize?: WorkflowApiToolAuthorizer;
            readonly ctx: ExtensionContext;
            readonly tool: WorkflowApiToolName;
          }): AgentToolResult<Record<string, unknown>> | undefined {
            const denial = input.authorize?.({ ctx: input.ctx, tool: input.tool });
            if (denial === undefined) return undefined;
            return errorResult(denial, { status: "forbidden", tool: input.tool });
          }

          function compactHandle(record: WorkflowHandleResult): Record<string, unknown> {
            return {
              handleId: record.id,
              status: record.status,
              value: record.value,
              error: record.errors?.join(" | "),
              errors: record.errors,
            };
          }

          /** Projection used by deterministic session bootstrap and model-facing inspection. */
          export function projectWorkflowInspection(
            snapshot: WorkflowAuthoritySnapshot,
          ): Record<string, unknown> {
            return {
              actor: {
                source: snapshot.source,
                role: snapshot.role,
              },
              node: {
                nodeId: snapshot.workflow.currentState,
                difficulty: snapshot.workflow.difficulty,
                revision: snapshot.workflow.revision,
              },
              agents: snapshot.workflow.options.map((option) => ({
                agent: option.agent,
                role: option.role,
                purpose: option.purpose,
                description: option.description,
                category: option.category,
                modes: [...option.allowedModes],
                returns: {
                  schemaId: option.outputSchemaId,
                  schema: option.resultSchema,
                },
              })),
              authority: {
                remainingDelegationDepth: snapshot.delegation.remainingDepth,
                effectiveTools: [...snapshot.effectiveTools],
              },
            };
          }

          async function spawn(input: {
            readonly workflow: WorkflowRuntimePort;
            readonly parent?: ParentExecutionContext;
            readonly agent: string;
            readonly task: string;
            readonly requirements?: readonly string[] | string;
            readonly mode?: "await" | "background";
            readonly signal: AbortSignal | undefined;
            readonly ctx: ExtensionContext;
          }): Promise<AgentToolResult<Record<string, unknown>>> {
            const requirements = normalizeWorkflowRequirements(input.requirements);
            const execution = await input.workflow.spawn({
              agent: input.agent,
              task: input.task,
              ...(requirements && requirements.length > 0 ? { requirements } : {}),
              ...(input.mode ? { mode: input.mode } : {}),
              ...(input.parent ? { parent: input.parent } : {}),
              signal: input.signal ?? new AbortController().signal,
              ctx: input.ctx,
            });
            if (!execution.ok) return errorResult(execution.message, execution.details);

            return result({
              ...execution.transition,
              ...compactHandle(execution.record),
            });
          }

          async function invokeWorkflowAction(input: {
            readonly params: WorkflowActionParamsType;
            readonly workflow: WorkflowRuntimePort;
            readonly parent?: ParentExecutionContext;
            readonly signal: AbortSignal | undefined;
            readonly ctx: ExtensionContext;
          }): Promise<AgentToolResult<Record<string, unknown>>> {
            switch (input.params.action) {
              case "inspect":
                return result(
                  projectWorkflowInspection(
                    input.workflow.inspect({
                      ctx: input.ctx,
                      ...(input.parent ? { parent: input.parent } : {}),
                    }),
                  ),
                );

              case "spawn":
                return spawn({
                  workflow: input.workflow,
                  ...(input.parent ? { parent: input.parent } : {}),
                  agent: input.params.agent,
                  task: input.params.task,
                  ...(input.params.requirements !== undefined
                    ? { requirements: input.params.requirements }
                    : {}),
                  ...(input.params.mode ? { mode: input.params.mode } : {}),
                  signal: input.signal,
                  ctx: input.ctx,
                });
            }
          }

          export function createWorkflowTool(input: {
            readonly workflow: WorkflowRuntimePort;
            readonly parent?: ParentExecutionContext;
            readonly authorize?: WorkflowApiToolAuthorizer;
          }): ToolDefinition<typeof WorkflowActionParams, Record<string, unknown>> {
            return {
              name: PHENIX_WORKFLOW_TOOL,
              label: "Phenix Workflow",
              description:
                "Inspect current workflow authority or spawn one advertised target agent. " +
                "Use this whenever the user explicitly requests workflow delegation or subagents. " +
                "The runtime derives the actor and current node from the active root session or initialized child contract, and owns transition selection, roles, routing, models, tools, child authority, contracts, and state changes.",
              parameters: WorkflowActionParams,

              async execute(_toolCallId, params, signal, _onUpdate, ctx) {
                const forbidden = authorizationResult({
                  authorize: input.authorize,
                  ctx,
                  tool: PHENIX_WORKFLOW_TOOL,
                });
                if (forbidden) return forbidden;

                try {
                  return await invokeWorkflowAction({
                    params,
                    workflow: input.workflow,
                    ...(input.parent ? { parent: input.parent } : {}),
                    signal,
                    ctx,
                  });
                } catch (error) {
                  return errorResult(error instanceof Error ? error.message : String(error));
                }
              },
            };
          }

          export function createDirectSubagentTool(input: {
            readonly workflow: WorkflowRuntimePort;
            readonly parent?: ParentExecutionContext;
            readonly authorize?: WorkflowApiToolAuthorizer;
          }): ToolDefinition<typeof DirectSubagentParams, Record<string, unknown>> {
            return {
              name: PHENIX_SUBAGENT_TOOL,
              label: "Phenix Subagent",
              description:
                "Spawn a contract-owned Phenix child directly when the current authority explicitly enables phenix_subagent. " +
                "Normally use phenix_workflow instead. This tool never bypasses workflow contracts, routing, task-subtree ownership, or verification.",
              parameters: DirectSubagentParams,

              async execute(_toolCallId, params: DirectSubagentParamsType, signal, _onUpdate, ctx) {
                const forbidden = authorizationResult({
                  authorize: input.authorize,
                  ctx,
                  tool: PHENIX_SUBAGENT_TOOL,
                });
                if (forbidden) return forbidden;

                try {
                  const authority = input.workflow.inspect({
                    ctx,
                    ...(input.parent ? { parent: input.parent } : {}),
                  });
                  const availableAgents = authority.workflow.options.map((option) => option.agent);

                  if (!authority.effectiveTools.includes(PHENIX_SUBAGENT_TOOL)) {
                    return errorResult(
                      "Direct Phenix subagent creation is not authorized for the current workflow node. Use phenix_workflow with action=spawn and one advertised target agent.",
                      {
                        code: "DIRECT_SUBAGENT_NOT_AUTHORIZED",
                        availableAgents,
                      },
                    );
                  }

                  const agent =
                    params.agent ?? (availableAgents.length === 1 ? availableAgents[0] : undefined);
                  if (!agent) {
                    return errorResult(
                      "Direct subagent creation requires an agent because multiple targets are currently available.",
                      {
                        code: "DIRECT_SUBAGENT_AGENT_REQUIRED",
                        availableAgents,
                      },
                    );
                  }
                  if (!availableAgents.includes(agent)) {
                    return errorResult(`Agent ${agent} is not currently available.`, {
                      code: "WORKFLOW_AGENT_NOT_AVAILABLE",
                      availableAgents,
                    });
                  }

                  return await spawn({
                    workflow: input.workflow,
                    ...(input.parent ? { parent: input.parent } : {}),
                    agent,
                    task: params.task,
                    ...(params.requirements !== undefined
                      ? { requirements: params.requirements }
                      : {}),
                    ...(params.mode ? { mode: params.mode } : {}),
                    signal,
                    ctx,
                  });
                } catch (error) {
                  return errorResult(error instanceof Error ? error.message : String(error));
                }
              },
            };
          }

          export function createWorkflowApiTools(input: {
            readonly workflow: WorkflowRuntimePort;
            readonly parent?: ParentExecutionContext;
            readonly authorize?: WorkflowApiToolAuthorizer;
          }): readonly ToolDefinition[] {
            return [
              createWorkflowTool(input) as unknown as ToolDefinition,
              createDirectSubagentTool(input) as unknown as ToolDefinition,
            ];
          }
          EOF

          cat > modules/phenix-pi/packages/phenix-suite/runtime/session-event-normalizer.ts <<'EOF'
          /** Normalize Pi session events into the runtime-neutral child event stream. */

          import type {
            ChildRunId,
            ChildSessionEvent,
            SerializedError,
          } from "./child-session-types.ts";

          interface PiAgentEvent {
            readonly type: string;
            readonly tool?: string;
            readonly toolName?: string;
            readonly name?: string;
            readonly code?: unknown;
            readonly error?: unknown;
            readonly errorMessage?: unknown;
            readonly isError?: boolean;
            readonly message?: unknown;
            readonly messages?: readonly unknown[];
          }

          function messageFromUnknown(value: unknown): string | undefined {
            if (typeof value === "string" && value.trim().length > 0) return value.trim();
            if (value instanceof Error && value.message.trim().length > 0) return value.message.trim();
            if (typeof value !== "object" || value === null) return undefined;

            const record = value as Record<string, unknown>;
            return (
              messageFromUnknown(record.errorMessage) ??
              messageFromUnknown(record.message) ??
              messageFromUnknown(record.error)
            );
          }

          function messageFromMessages(messages: readonly unknown[] | undefined): string | undefined {
            if (!messages) return undefined;
            for (let index = messages.length - 1; index >= 0; index--) {
              const message = messageFromUnknown(messages[index]);
              if (message) return message;
            }
            return undefined;
          }

          /** Preserve the concrete provider diagnostic instead of collapsing it to an abort. */
          export function providerFailureFromPiEvent(raw: PiAgentEvent): SerializedError | undefined {
            if (!isFailureEvent(raw)) return undefined;
            const message =
              messageFromUnknown(raw.error) ??
              messageFromUnknown(raw.errorMessage) ??
              messageFromUnknown(raw.message) ??
              messageFromMessages(raw.messages) ??
              "Provider/model execution failed.";
            return {
              code: typeof raw.code === "string" && raw.code.length > 0 ? raw.code : "PROVIDER_FAILED",
              message,
            };
          }

          export function normalizePiEvent(
            runId: ChildRunId,
            raw: PiAgentEvent,
          ): readonly ChildSessionEvent[] {
            const events: ChildSessionEvent[] = [];

            if (raw.type === "tool_execution_start") {
              events.push({
                type: "tool.started",
                runId,
                toolName: raw.toolName ?? raw.tool ?? raw.name ?? "unknown",
              });
            }

            if (raw.type === "tool_execution_end") {
              const isError = raw.isError === true || raw.error != null;
              events.push({
                type: "tool.completed",
                runId,
                toolName: raw.toolName ?? raw.tool ?? raw.name ?? "unknown",
                isError,
              });
            }

            if (raw.type === "agent_end" || raw.type === "turn_end") {
              events.push({
                type: "agent.event",
                runId,
                event: raw,
              });
            }

            if (
              raw.type !== "tool_execution_start" &&
              raw.type !== "tool_execution_end" &&
              raw.type !== "agent_end" &&
              raw.type !== "turn_end"
            ) {
              events.push({
                type: "agent.event",
                runId,
                event: raw,
              });
            }

            return events;
          }

          /** Pi's authoritative overall idle boundary. */
          export function isSettlementEvent(raw: PiAgentEvent): boolean {
            return raw.type === "agent_settled";
          }

          /** Determine whether a Pi event indicates a provider/model failure. */
          export function isFailureEvent(raw: PiAgentEvent): boolean {
            return raw.type === "error" || (raw.type === "agent_end" && raw.error != null);
          }
          EOF

          cat > modules/phenix-pi/packages/phenix-suite/tasks/suite-integration.ts <<'EOF'
          import type {
            ExtensionAPI,
            ExtensionContext,
            ToolDefinition,
          } from "@earendil-works/pi-coding-agent";
          import { getSessionRuntime } from "@matthis-k/phenix-routing/state.ts";
          import type {
            PhenixTaskService,
            TaskNode,
            TaskState,
            TaskSummary,
          } from "@matthis-k/phenix-tasks/index.ts";
          import { createTaskTools } from "@matthis-k/phenix-tasks/pi-tools.ts";

          import { authorizePhenixRootCapability, phenixRootModelScope } from "../composition/model-scope.ts";

          const TASK_WIDGET_ID = "phenix-tasks";
          const MAX_TREE_LINES = 12;

          function sessionId(ctx: ExtensionContext): string {
            return ctx.sessionManager.getSessionId() ?? "default";
          }

          function taskGuidance(): string {
            return [
              "## Phenix task tracking",
              "",
              "Keep the shared Phenix task tree synchronized with the work you actually perform.",
              "Use phenix_tasks to inspect your owned subtree, add child tasks before substantial independent steps, mark a task wip when starting it, and mark it done immediately after completing and verifying it.",
              "Do not use tasks as a narrative log. Keep them bounded, outcome-oriented, and current.",
              "The runtime enforces subtree ownership; never attempt to modify ancestors or sibling subtrees.",
            ].join("\n");
          }

          function statusText(summary: TaskSummary): string {
            return `Tasks · ${summary.done}/${summary.total} done · ${summary.wip} wip`;
          }

          function stateGlyph(state: TaskState): string {
            if (state === "done") return "✓";
            if (state === "wip") return "◐";
            return "○";
          }

          function assignmentSuffix(task: TaskNode): string {
            const owner =
              task.completedBySessionId ?? task.startedBySessionId ?? task.assignedSessionId;
            return owner ? ` · @${owner.slice(0, 8)}` : "";
          }

          function compactTitle(title: string): string {
            return title.length <= 72 ? title : `${title.slice(0, 69)}...`;
          }

          /** Render a bounded, stable tree suitable for Pi's small above-editor widget. */
          export function renderTaskTree(
            root: TaskNode,
            summary: TaskSummary,
            maximumLines = MAX_TREE_LINES,
          ): readonly string[] {
            const body: string[] = [];
            let omitted = 0;

            const visit = (
              task: TaskNode,
              prefix: string,
              connector: "" | "├─ " | "└─ ",
            ): void => {
              if (body.length >= Math.max(1, maximumLines - 1)) {
                omitted += 1;
                return;
              }
              body.push(
                `${prefix}${connector}${stateGlyph(task.effectiveState)} ${compactTitle(task.title)}${assignmentSuffix(task)}`,
              );
              task.children.forEach((child, index) => {
                const last = index === task.children.length - 1;
                const childPrefix = connector === "" ? "" : `${prefix}${connector === "└─ " ? "   " : "│  "}`;
                visit(child, childPrefix, last ? "└─ " : "├─ ");
              });
            };

            visit(root, "", "");
            const lines = [statusText(summary), ...body];
            if (omitted > 0 && lines.length < maximumLines) lines.push(`… ${omitted} more`);
            return lines.slice(0, maximumLines);
          }

          function updateProjection(
            service: PhenixTaskService,
            workflowId: string,
            ctx: ExtensionContext,
          ): void {
            const summary = service.summary(workflowId);
            ctx.ui.setStatus(TASK_WIDGET_ID, statusText(summary));
            const ownerSessionId = service.workflowOwnerSessionId(workflowId);
            const authority = ownerSessionId ? service.rootAuthorityForSession(ownerSessionId) : undefined;
            if (!authority) return;
            ctx.ui.setWidget(TASK_WIDGET_ID, [...renderTaskTree(service.inspect(authority.token), summary)]);
          }

          export function registerSuiteTasks(input: {
            readonly pi: ExtensionAPI;
            readonly service: PhenixTaskService;
          }): void {
            const contexts = new Map<string, ExtensionContext>();

            input.pi.on("session_start", async (_event, ctx) => {
              contexts.set(sessionId(ctx), ctx);
            });

            input.pi.on("before_agent_start", async (event, ctx) => {
              if (!phenixRootModelScope.includes(ctx.model)) return;
              const id = sessionId(ctx);
              const activeWorkflow = getSessionRuntime(id).activeWorkflow;
              if (!activeWorkflow) return;

              input.service.ensureWorkflow({
                workflowId: activeWorkflow.instanceId,
                ownerSessionId: id,
                rootActorId: activeWorkflow.actorId,
                title: event.prompt,
              });

              updateProjection(input.service, activeWorkflow.instanceId, ctx);
              const systemPrompt = phenixRootModelScope.contributeSystemPrompt({
                model: ctx.model,
                systemPrompt: event.systemPrompt,
                contribution: taskGuidance(),
              });
              return systemPrompt === undefined ? undefined : { systemPrompt };
            });

            for (const tool of createTaskTools({
              service: input.service,
              resolveAuthority: (ctx) => input.service.rootAuthorityForSession(sessionId(ctx)),
              authorize: (ctx) => authorizePhenixRootCapability({ ctx, capability: "phenix_tasks" }),
            })) {
              input.pi.registerTool(tool as ToolDefinition as never);
            }

            input.service.subscribe((event) => {
              const ownerSessionId = input.service.workflowOwnerSessionId(event.workflowId);
              const ctx = ownerSessionId ? contexts.get(ownerSessionId) : undefined;
              if (!ctx) return;
              try {
                updateProjection(input.service, event.workflowId, ctx);
                if (
                  event.kind === "task.started" ||
                  event.kind === "task.completed" ||
                  event.kind === "task.delegated" ||
                  event.kind === "task.failed"
                ) {
                  const verb =
                    event.kind === "task.completed"
                      ? "Done"
                      : event.kind === "task.failed"
                        ? "Blocked"
                        : event.kind === "task.delegated"
                          ? "Delegated"
                          : "Working";
                  ctx.ui.notify(
                    `${verb}: ${event.task.title}`,
                    event.kind === "task.failed" ? "warning" : "info",
                  );
                }
              } catch {
                // The task service remains authoritative when the UI is unavailable.
              }
            });

            input.pi.on("context", async (_event, ctx) => {
              const activeWorkflow = getSessionRuntime(sessionId(ctx)).activeWorkflow;
              if (!activeWorkflow) return;
              try {
                updateProjection(input.service, activeWorkflow.instanceId, ctx);
              } catch {
                // UI projection is optional.
              }
            });

            input.pi.on("session_shutdown", async (_event, ctx) => {
              contexts.delete(sessionId(ctx));
            });
          }
          EOF

          cat > modules/phenix-pi/skills/phenix-subagents/SKILL.md <<'EOF'
          ---
          name: phenix-subagents
          description: Use whenever the user explicitly requests Phenix workflows, delegation, or subagents; also use for bounded isolated work that materially reduces context.
          ---

          # Phenix workflow

          Phenix workflow nodes, legal transitions, configured-agent availability,
          delegation depth, role authority, output schemas, model routing, verification,
          critics, repair limits, and task-subtree ownership are owned by the TypeScript
          runtime.

          When the user explicitly asks to use subagents, delegation, or the Phenix
          workflow, do not silently continue as a single agent. Your first substantive
          execution action must use `phenix_workflow` to spawn an advertised target.
          Use `action: "inspect"` first only when the current authority was not injected
          or a prior workflow action may have changed it. If spawning fails, surface the
          exact runtime/provider error and do not claim subagents were used.

          Before the model starts, the runtime resolves the current root-session or child-
          contract authority and injects the target agents that may be spawned from the
          current workflow node into the system prompt. Do not send a node or transition
          ID back to the runtime.

          Use the primary `phenix_workflow` interface with:

          - `action: "spawn"`;
          - one advertised target `agent`;
          - a bounded `task`, with optional requirements and execution mode.

          `phenix_subagent` is an optional convenience tool. Use it only when the current
          authority explicitly lists it in `effectiveTools`. It still executes through the
          workflow runtime and never bypasses contracts, routing, task ownership, or
          verification. Raw `subagent` remains unmanaged and is blocked in Phenix sessions.

          The runtime derives the current node from the active root session or child
          contract, resolves fresh authority, maps the requested target agent to the unique
          legal transition, then derives the child role, model, thinking level, output
          schema, tools, budgets, verification, critic gates, and owned task subtree.

          Use `phenix_tasks` to keep that subtree synchronized with actual execution. Add
          bounded child tasks before independent work, mark a task `wip` when beginning it,
          and mark it `done` immediately after completion and verification. Do not use the
          tree as a narrative log. A child may update its assigned task and descendants,
          but cannot update ancestors or sibling subtrees. Spawning a child automatically
          creates and assigns its task; do not manually mark a delegation task WIP first.

          Delegate when a bounded child can absorb substantial intermediate context whose
          underlying details are not needed for your remaining work, or when independent
          execution materially improves evidence, planning, implementation, testing, or
          review. Broad reconnaissance is a strong candidate when it can be compressed to
          relevant files, symbols, constraints, excluded areas, and uncertainties.
