name: Format integration

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    if: github.head_ref == 'integrate-tend'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply repository formatters
        run: |
          nix develop --command biome format --write .tend.json
          nix develop --command nixfmt modules/tend.nix modules/tooling.nix

      - name: Upload formatted files
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: formatted-integration
          path: |
            .tend.json
            modules/tend.nix
            modules/tooling.nix
          include-hidden-files: true
          if-no-files-found: error
