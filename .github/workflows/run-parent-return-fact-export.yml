name: Run parent return and fact export patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/parent-return-facts-export-final2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact Biome output
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('modules/phenix-pi/extension/root-extension.ts')
          text = path.read_text()
          text = text.replace(
              '''import {
  completePhenixSubcommands,
  PHENIX_FACTS_USAGE,
  PHENIX_USAGE,
} from "./phenix-command.ts";''',
              '''import { completePhenixSubcommands, PHENIX_FACTS_USAGE, PHENIX_USAGE } from "./phenix-command.ts";''',
              1,
          )
          text = text.replace(
              '''            ctx.ui.notify(
              `Copied ${exported.count} facts using: ${factsAction.command}`,
              "info",
            );''',
              '''            ctx.ui.notify(`Copied ${exported.count} facts using: ${factsAction.command}`, "info");''',
              1,
          )
          path.write_text(text)
          Path('.github/workflows/format-pr108.yml').unlink(missing_ok=True)
          Path('.github/workflows/run-parent-return-fact-export.yml').unlink()
          PY
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Apply source formatting"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
