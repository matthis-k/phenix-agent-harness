# Test fixtures for static Phenix agent model config.

cases:
  - id: static-model-config-all-phenix-agents
    request: "Verify generated OpenCode config model fields."
    expected:
      model_source: opencode_static_config
      model: openai/gpt-5.5
      agents:
        - phenix-workflow
        - phenix-planner
        - phenix-architect
        - phenix-worker
        - phenix-verifier
        - phenix-architecture-verifier
        - phenix-commit-sync
        - failure-analyzer
        - uiux-designer
    notes: All Phenix agents use schema-valid OpenCode model fields.

  - id: no-rust-routing-debt
    request: "Ensure routing is not implemented in Rust."
    expected_absent:
      - src/routing.rs
      - src/bin/phenix-route.rs
      - Cargo.toml bin phenix-route
    notes: Rust must not own routing modes, model slots, or resolvers.

  - id: no-custom-route-command
    request: "Ensure OpenCode config has no custom route command."
    expected:
      command_route_present: false
      wrapper_route_overlay: false
    notes: No Ctrl-T route command or wrapper state helper is part of the final architecture.

  - id: reject-custom-top-level-routing-key
    request: "Ensure custom routing YAML is not injected into OpenCode config."
    expected_absent:
      - phenix_agent_routing
      - routing_matrix
      - model_slots
    notes: OpenCode rejects unknown top-level config keys; only schema-valid fields are generated.
