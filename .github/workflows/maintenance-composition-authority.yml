name: Apply composition authority cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out composition branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/06-composition-authority
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Remove obsolete workflow placeholder
        run: python .github/maintenance/remove-workflow-placeholder.py

      - name: Format touched TypeScript
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix.ts \
            modules/phenix-pi/extensions/phenix-composition/configuration.ts \
            modules/phenix-pi/extensions/phenix-composition/index.ts \
            modules/phenix-pi/extensions/phenix-composition/linked-graph.ts \
            modules/phenix-pi/extensions/phenix-composition/linker.ts \
            modules/phenix-pi/tests/composition-authority.test.ts

      - name: Commit source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi
          git diff --cached --check
          git commit -m "refactor(composition): remove fictitious workflow graph"
          git push origin HEAD:qa/06-composition-authority
