name: Apply runtime lifecycle maintenance

on:
  push:
    branches:
      - qa/01-runtime-lifecycle

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out maintenance branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Apply deterministic source transformation
        run: python .github/maintenance/apply.py

      - name: Remove maintenance bootstrap
        run: |
          rm -f .github/maintenance/apply.py
          rmdir .github/maintenance 2>/dev/null || true
          rm -f .github/workflows/maintenance-apply.yml

      - name: Commit transformed sources
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(runtime): settle cancelled and orphaned workflows"
          git push origin HEAD:qa/01-runtime-lifecycle
