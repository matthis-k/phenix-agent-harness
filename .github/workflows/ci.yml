name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'refactor/standalone-devenv-maintenance'
    name: Apply final test cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refactor/standalone-devenv-maintenance
          fetch-depth: 0
      - name: Remove stale routing test helpers
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("modules/phenix-pi/tests/routing-workflow.test.ts")
          text = path.read_text()
          text = text.replace(
              '''import {
            modelSetForModelId,
            PHENIX_MODEL,
            PHENIX_MODEL_SETS,
            PHENIX_PROVIDER,
          } from "../extensions/phenix-routing/provider.ts";''',
              '''import {
            modelSetForModelId,
            PHENIX_MODEL_SETS,
          } from "../extensions/phenix-routing/provider.ts";''',
          )
          text = text.replace(
              '''function goOnlyRegistry(): ModelRegistry {
            return new FakeRegistry(ALL_POOL_MODELS.filter((m) => m.provider === "opencode-go"));
          }

          function gptOnlyRegistry(): ModelRegistry {
            return new FakeRegistry(ALL_POOL_MODELS.filter((m) => m.provider === "openai-codex"));
          }

          ''',
              "",
          )
          path.write_text(text)
          PY

          if git diff --quiet -- modules/phenix-pi/tests/routing-workflow.test.ts; then
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi/tests/routing-workflow.test.ts
          git commit -m "test: remove unused routing helpers"
          git push origin HEAD:refactor/standalone-devenv-maintenance

  checks:
    name: Final maintenance checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { fetch-depth: 0 }
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Run repository maintenance
        shell: bash
        run: |
          set +e
          devenv test > devenv-test.log 2>&1
          status=$?
          tail -n 320 devenv-test.log
          exit "$status"
      - name: Upload devenv diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devenv-test-log
          path: devenv-test.log
          if-no-files-found: error
