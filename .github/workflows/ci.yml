name: CI

on:
  pull_request:
  push:
    branches:
      - fix/subagent-tools-task-tree

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/subagent-tools-task-tree
          fetch-depth: 0
          show-progress: false
      - name: Patch skipped diagnostics
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          sdk = Path('modules/phenix-pi/packages/phenix-suite/runtime/sdk-child-session-backend.ts')
          text = sdk.read_text()
          old = '''      (error) => {
            if (!preflightSeen) reject(error);
            void this.failAndAbort(
              new ChildRuntimeError(
                "PROVIDER_FAILED",
                error instanceof Error ? error.message : String(error),
                { cause: error },
              ),
            );
          },
          '''
          new = '''      (error) => {
            const providerMessage = this.lastProviderFailure?.message;
            const message =
              providerMessage ?? (error instanceof Error ? error.message : String(error));
            const providerError = new ChildRuntimeError("PROVIDER_FAILED", message, {
              cause: error,
            });
            if (!preflightSeen) reject(providerError);
            void this.failAndAbort(providerError);
          },
          '''
          if old not in text:
              raise SystemExit('SDK provider rejection block not found')
          sdk.write_text(text.replace(old, new, 1))

          delegator = Path('modules/phenix-pi/packages/phenix-suite/subagents/workflow-delegator.ts')
          text = delegator.read_text()
          old = '''          details: {
            code: execution.error.code,
            handleId: execution.record.id,
            status: execution.record.status,
          },
          '''
          new = '''          details: {
            code: execution.error.code,
            handleId: execution.record.id,
            status: execution.record.status,
            errors: execution.record.errors,
          },
          '''
          if old not in text:
              raise SystemExit('Workflow failure detail block not found')
          delegator.write_text(text.replace(old, new, 1))
          PY
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: preserve child provider diagnostics"
          git pull --rebase origin fix/subagent-tools-task-tree
          git push origin HEAD:fix/subagent-tools-task-tree
