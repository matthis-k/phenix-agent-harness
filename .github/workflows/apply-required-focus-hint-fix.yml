name: Apply required focus-hint fix

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-required-focus-hint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'fix/required-focus-hint-gate'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: fix/required-focus-hint-gate
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Apply source patch
        run: |
          python scripts/apply-required-focus-hint-fix.py
          rm scripts/apply-required-focus-hint-fix.py
          rm .github/workflows/apply-required-focus-hint-fix.yml
          devenv tasks run maintenance:fix
      - name: Run repository maintenance
        id: maintenance
        shell: bash
        run: |
          set +e
          devenv test > maintenance.log 2>&1
          status=$?
          tail -n 400 maintenance.log
          exit "$status"
      - name: Upload maintenance diagnostics
        if: failure() && steps.maintenance.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: required-focus-hint-maintenance-log
          path: maintenance.log
          if-no-files-found: error
      - name: Commit clean source change
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "fix: treat required delegation task as focus hint"
          git push origin HEAD:fix/required-focus-hint-gate
