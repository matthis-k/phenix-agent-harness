name: Generate deterministic FTA lock

on:
  push:
    branches: [fix/deterministic-qa-metrics]
    paths: [.github/workflows/generate-fta-lock.yml]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: fix/deterministic-qa-metrics
          fetch-depth: 0
      - name: Update locked QA metrics dependency
        shell: bash
        run: |
          set -euo pipefail
          cd modules/pi-npm
          npm install \
            --package-lock-only \
            --ignore-scripts \
            --legacy-peer-deps \
            --save-exact \
            fta-cli@3.0.0
          cd ../..

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/pi-npm/package.json modules/pi-npm/package-lock.json
          git commit -m "build(pi): lock FTA metrics analyzer"

          git rm .github/workflows/generate-fta-lock.yml
          git commit -m "chore: remove FTA lock generator"
          git push origin HEAD:fix/deterministic-qa-metrics
