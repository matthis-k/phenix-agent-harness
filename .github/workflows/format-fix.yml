name: Format fix

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: format-fix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  format:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: complete-clean-architecture
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Apply repository formatter
        run: |
          devenv shell -- biome check \
            --write \
            --unsafe \
            --config-path biome.json \
            --no-errors-on-unmatched \
            --files-ignore-unknown=true \
            biome.json modules || true
      - name: Commit formatter output
        shell: bash
        run: |
          if git diff --quiet -- biome.json modules; then
            echo "No formatter changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add biome.json modules
          git commit -m "style: apply repository formatting"
          git push origin HEAD:complete-clean-architecture
