name: Diagnose final facade architecture

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'fix/subagent-tools-task-tree'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/subagent-tools-task-tree
          fetch-depth: 0
          show-progress: false
      - name: Capture exact patch failure
        run: |
          set -uo pipefail
          cat tools/final-patch/part1-* > /tmp/part1.py
          cat tools/final-patch/part2-* > /tmp/part2.py
          cat tools/final-patch/part3-* > /tmp/part3.py
          cat tools/final-patch/part4-* > /tmp/part4.py
          : > tools/final-patch/error.txt
          status=0
          for script in /tmp/part1.py /tmp/part2.py /tmp/part3.py /tmp/part4.py; do
            printf '\n=== %s ===\n' "$script" >> tools/final-patch/error.txt
            python3 "$script" >> tools/final-patch/error.txt 2>&1 || { status=$?; break; }
          done
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tools/final-patch/error.txt
          git commit -m "ci: capture facade patch failure"
          git push origin HEAD:fix/subagent-tools-task-tree
          exit "$status"