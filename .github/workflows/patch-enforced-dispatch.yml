name: Patch enforced dispatch

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: feat/enforced-workflow-dispatch
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Apply dispatch architecture
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(source: str, old: str, new: str, label: str) -> str:
              count = source.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return source.replace(old, new)

          # Agent definitions: a no-tools classifier and a read-only dynamic coordinator.
          path = Path("modules/phenix-pi/definitions/agents/index.ts")
          source = path.read_text()
          source = replace_once(
              source,
              '''  AGENT_ARCHITECT,
            AGENT_BASE,
            AGENT_CRITIC,''',
              '''  AGENT_ARCHITECT,
            AGENT_BASE,
            AGENT_COORDINATOR,
            AGENT_CRITIC,
            AGENT_DISPATCHER,''',
              "agent ids",
          )
          source = replace_once(
              source,
              '''  AGENT_VERIFIER,
            ALL_DEFINITION_IDS,
          } from "../ids.ts";''',
              '''  AGENT_VERIFIER,
            ALL_DEFINITION_IDS,
            WORKFLOW_IMPLEMENT,
            WORKFLOW_QA,
          } from "../ids.ts";''',
              "workflow ids",
          )
          source = replace_once(
              source,
              '''} from "../ids.ts";
          import {''',
              '''} from "../ids.ts";
          import { DispatchDecisionSchema } from "../dispatch.ts";
          import {''',
              "dispatch schema import",
          )
          definitions = '''export const dispatcherDefinition: AgentDefinition<unknown, unknown> = {
            id: AGENT_DISPATCHER,
            kind: "agent",
            title: "Execution dispatcher",
            description: "Choose the typed execution route for an ambiguous substantial request.",
            input: ObjectiveRequestSchema,
            output: DispatchDecisionSchema,
            model: sessionModel,
            thinking: "minimal",
            prompt: {
              render: () =>
                "Classify the request into exactly one route: qa for repository review or audit without requested mutation; implement for a concrete requested code change; coordinate for multi-stage, mixed review-and-fix, or otherwise open-ended substantial work. Return only the typed decision. Do not perform repository work.",
            },
            tools: { allow: [] },
            context: { ...context, projectFiles: "none", maxBytes: 8_000 },
            childCapabilities: none,
            limits: { timeoutMs: 120_000, maxTurns: 2, maxToolCalls: 1, maxRepairAttempts: 1 },
            persistence: "memory",
          };

          export const coordinatorDefinition: AgentDefinition<unknown, unknown> = {
            id: AGENT_COORDINATOR,
            kind: "agent",
            title: "Dynamic execution coordinator",
            description: "Compose invariant workflows and focused read-only agents for nontrivial open-ended tasks.",
            input: ObjectiveRequestSchema,
            output: BaseResultSchema,
            model: sessionModel,
            thinking: "route",
            prompt: {
              render: () =>
                "Act as a read-only execution coordinator. Compose workflow.qa and workflow.implement when their invariants match. Use focused read-only agents only for evidence gaps. For review-then-fix work, run workflow.qa, inspect its typed outcome, then invoke workflow.implement only when actionable findings require mutation. Never edit files or reproduce workflow internals manually. Own the final synthesis.",
            },
            tools: {
              allow: [
                "read",
                "grep",
                "find",
                "ls",
                "phenix_run",
                "phenix_handle",
                "phenix_tasks",
              ],
            },
            context,
            childCapabilities: capabilities(
              [
                WORKFLOW_QA,
                WORKFLOW_IMPLEMENT,
                AGENT_SCOUT,
                AGENT_PLANNER,
                AGENT_ARCHITECT,
                AGENT_TESTER,
                AGENT_VERIFIER,
                AGENT_CRITIC,
                AGENT_FINALIZER,
              ],
              4,
            ),
            limits: { timeoutMs: 2_400_000, maxTurns: 24, maxToolCalls: 160, maxRepairAttempts: 2 },
            persistence: "memory",
          };

          '''
          source = replace_once(
              source,
              "export const baseDefinition: AgentDefinition<unknown, unknown> = {",
              definitions + "export const baseDefinition: AgentDefinition<unknown, unknown> = {",
              "dispatch definitions",
          )
          source = replace_once(
              source,
              '''  finalizerDefinition,
            baseDefinition,''',
              '''  finalizerDefinition,
            dispatcherDefinition,
            coordinatorDefinition,
            baseDefinition,''',
              "agent registry",
          )
          path.write_text(source)

          # Root invocation capabilities are explicit and enforced for root as well as children.
          path = Path("modules/phenix-pi/application/execution-facade.ts")
          source = path.read_text()
          source = replace_once(
              source,
              '''  cancelled,
            type Failure,''',
              '''  cancelled,
            type DefinitionId,
            type Failure,''',
              "definition id import",
          )
          source = replace_once(
              source,
              '''  private readonly clock: Clock;
            private readonly implementations''',
              '''  private readonly clock: Clock;
            private readonly rootInvokableDefinitions: readonly DefinitionId[];
            private readonly implementations''',
              "root capability field",
          )
          source = replace_once(
              source,
              '''    readonly ids: IdGenerator;
              readonly clock: Clock;
            }) {''',
              '''    readonly ids: IdGenerator;
              readonly clock: Clock;
              readonly rootInvokableDefinitions?: readonly DefinitionId[];
            }) {''',
              "constructor input",
          )
          source = replace_once(
              source,
              '''    this.ids = input.ids;
              this.clock = input.clock;
            }''',
              '''    this.ids = input.ids;
              this.clock = input.clock;
              this.rootInvokableDefinitions =
                input.rootInvokableDefinitions ?? this.catalog.list().map((definition) => definition.id);
            }''',
              "constructor assignment",
          )
          source = replace_once(
              source,
              '''      invokableDefinitions: this.catalog.list().map((definition) => definition.id),''',
              '''      invokableDefinitions: this.rootInvokableDefinitions,''',
              "root invokable list",
          )
          source = replace_once(
              source,
              '''      tools: ["phenix_run", "phenix_handle", "phenix_tasks"],''',
              '''      tools: ["phenix_dispatch", "phenix_handle", "phenix_tasks"],''',
              "root tools",
          )
          source = replace_once(
              source,
              '''    if (parent.kind !== "root" && !capabilities.invokableDefinitions.includes(definition.id)) {''',
              '''    if (!capabilities.invokableDefinitions.includes(definition.id)) {''',
              "root authorization",
          )
          path.write_text(source)

          # Compose the authoritative dispatch service and restricted root definition set.
          path = Path("modules/phenix-pi/composition/create-phenix-runtime.ts")
          source = path.read_text()
          source = replace_once(
              source,
              '''import { FacadeAgentToolFactory } from "../application/agent-tools.ts";''',
              '''import { FacadeAgentToolFactory } from "../application/agent-tools.ts";
          import { DispatchService } from "../application/dispatch-service.ts";''',
              "dispatch service import",
          )
          source = replace_once(
              source,
              '''import { agentDefinitions } from "../definitions/agents.ts";''',
              '''import { agentDefinitions } from "../definitions/agents.ts";
          import { ROOT_DISPATCH_DEFINITION_IDS } from "../definitions/ids.ts";''',
              "root ids import",
          )
          source = replace_once(
              source,
              '''    ids,
              clock: systemClock,
            });''',
              '''    ids,
              clock: systemClock,
              rootInvokableDefinitions: ROOT_DISPATCH_DEFINITION_IDS,
            });''',
              "execution root capabilities",
          )
          source = replace_once(
              source,
              '''  const invocationPolicy = new SessionInvocationPolicy({ store, catalog: definitions });
            const tools = new FacadeAgentToolFactory({
              execution,''',
              '''  const invocationPolicy = new SessionInvocationPolicy({ store, catalog: definitions });
            const dispatch = new DispatchService({
              execution,
              catalog,
              store,
              invocationPolicy,
            });
            const tools = new FacadeAgentToolFactory({
              execution,
              dispatch,''',
              "dispatch composition",
          )
          path.write_text(source)

          # Root prompt and active tools make the orchestration boundary explicit.
          path = Path("modules/phenix-pi/extension/root-extension.ts")
          source = path.read_text()
          source = replace_once(
              source,
              '''- Compose typed agents and invariant workflows through phenix_run; workflows own mandatory actors, transitions, and verification.''',
              '''- Directly answer only simple read-only questions.
          - A full repository QA, audit, or broad review MUST use phenix_dispatch with mode=qa.
          - Any requested repository mutation MUST use phenix_dispatch with mode=implement.
          - Mixed review-and-fix or ambiguous nontrivial work MUST use phenix_dispatch with mode=coordinate.
          - Never reproduce an invariant workflow manually; phenix_dispatch is the only root execution entry point.''',
              "root dispatch prompt",
          )
          pattern = re.compile(
              r'  const policies: Readonly<Record<SessionAgentPreset, readonly string\[\]>> = \{.*?\n  \};\n  const available',
              re.S,
          )
          replacement = '''  const orchestrationTools = [
              "read",
              "grep",
              "find",
              "ls",
              "phenix_dispatch",
              "phenix_handle",
              "phenix_tasks",
            ] as const;
            const readOnlyTools = ["read", "grep", "find", "ls"] as const;
            const policies: Readonly<Record<SessionAgentPreset, readonly string[]>> = {
              base: orchestrationTools,
              scout: readOnlyTools,
              planner: orchestrationTools,
              architect: orchestrationTools,
              implementer: orchestrationTools,
              tester: orchestrationTools,
              verifier: orchestrationTools,
              critic: orchestrationTools,
              finalizer: orchestrationTools,
            };
            const available'''
          source, count = pattern.subn(replacement, source)
          if count != 1:
              raise SystemExit(f"root tool policy: expected one match, found {count}")
          source = source.replace(
              'base: "Act as the root coordinator. Dynamically compose agents and invariant workflows only when they reduce risk or preserve context.",',
              'base: "Act as the read-only frontend coordinator. Answer simple read-only requests directly and route all substantial execution through phenix_dispatch.",',
          )
          source = source.replace(
              'implementer:\n      "Act as a focused implementer. Make bounded edits, run relevant checks, and avoid redesign outside the request.",',
              'implementer:\n      "Act as an implementation-routing frontend. Use phenix_dispatch with mode=implement; do not mutate the repository directly.",',
          )
          source = source.replace(
              'tester:\n      "Act as a test analyst. Run and interpret deterministic checks without editing implementation files.",',
              'tester:\n      "Act as a QA-routing frontend. Use phenix_dispatch with mode=qa for repository-level checks and reviews.",',
          )
          source = source.replace(
              'verifier:\n      "Act as an independent verifier. Do not edit; accept claims only with concrete evidence.",',
              'verifier:\n      "Act as a verification-routing frontend. Use phenix_dispatch with mode=qa for substantial repository verification.",',
          )
          path.write_text(source)

          # Existing extension test now asserts the root cannot see phenix_run.
          path = Path("modules/phenix-pi/tests/root-extension-session.test.ts")
          source = path.read_text()
          source = replace_once(
              source,
              '''    const taskTool = tools.get("phenix_tasks");
              assert.ok(taskTool);''',
              '''    const taskTool = tools.get("phenix_tasks");
              assert.ok(taskTool);
              assert.ok(tools.has("phenix_dispatch"));
              assert.equal(tools.has("phenix_run"), false);''',
              "root tool assertion",
          )
          path.write_text(source)
          PY
      - name: Format changed source
        run: |
          nix shell github:NixOS/nixpkgs/0bb7ec54c8483066ec9d7720e780a5caa71f8612#biome -c \
            biome check --write --unsafe --config-path biome.json --no-errors-on-unmatched \
            --files-ignore-unknown=true modules/phenix-pi || true
      - name: Commit dispatch architecture
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/phenix-pi
          git commit -m "feat: enforce workflow dispatch at root"
          git push origin HEAD:feat/enforced-workflow-dispatch
