name: Regenerate npm lock without Pi peers

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out npm branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: build/locked-pi-npm-dependencies
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Regenerate dependency lock
        id: npm
        shell: bash
        run: |
          set +e
          rm -f modules/pi-npm/package-lock.json
          nix shell nixpkgs#nodejs -c npm install \
            --prefix modules/pi-npm \
            --package-lock-only \
            --ignore-scripts \
            --legacy-peer-deps \
            --no-audit \
            --no-fund > npm-lock.log 2>&1
          status=$?
          cat npm-lock.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload npm diagnostics
        if: steps.npm.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: npm-lock-diagnostics
          path: npm-lock.log
          if-no-files-found: error

      - name: Fail when npm lock generation fails
        if: steps.npm.outputs.status != '0'
        run: exit 1

      - name: Assert Pi peers are not locked
        if: steps.npm.outputs.status == '0'
        run: |
          if grep -q 'node_modules/@earendil-works/pi-coding-agent' modules/pi-npm/package-lock.json; then
            echo 'Pi peer dependency was unexpectedly written into package-lock.json' >&2
            exit 1
          fi

      - name: Format generated sources
        if: steps.npm.outputs.status == '0'
        run: |
          nix run nixpkgs#biome -- check --write modules/pi-npm/package-lock.json
          nix run nixpkgs#nixfmt -- modules/pi-packages.nix

      - name: Commit regenerated lock
        if: steps.npm.outputs.status == '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            modules/pi-npm/package-lock.json \
            modules/pi-packages.nix
          git diff --cached --check
          git commit -m "build(npm): exclude Nix-provided Pi peers from lock"
          git push origin HEAD:build/locked-pi-npm-dependencies
