name: CI

on:
  pull_request:
  push:
    branches: [main, fix/root-workflow-entry-routing]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Final maintenance checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply root workflow entry contract
        if: github.ref_name == 'fix/root-workflow-entry-routing' || github.head_ref == 'fix/root-workflow-entry-routing'
        run: |
          python3 tools/apply-root-entry-patch.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi
          if ! git diff --cached --quiet; then
            git commit -m "fix(pi): require explicit root workflow entry route"
            git push origin HEAD:fix/root-workflow-entry-routing
          fi
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Run repository maintenance
        shell: bash
        run: |
          set +e
          devenv test > devenv-test.log 2>&1
          status=$?
          tail -n 320 devenv-test.log
          exit "$status"
      - name: Upload devenv diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: devenv-test-log
          path: devenv-test.log
          if-no-files-found: error
