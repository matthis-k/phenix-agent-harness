name: Apply final facade architecture

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/subagent-tools-task-tree'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/subagent-tools-task-tree
          fetch-depth: 0
          show-progress: false
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
      - name: Apply facade patch and clean staging
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          bad = [
              *Path('tools/final-patch').glob('part1-0[234]'),
              *Path('tools/final-patch').glob('part2-*'),
              *Path('tools/final-patch').glob('part4-*'),
          ]
          for path in bad:
              path.write_text(re.sub(r'(?<!\\)\\n', '\n', path.read_text()))
          PY
          cat tools/final-patch/part1-* > /tmp/part1.py
          cat tools/final-patch/part2-* > /tmp/part2.py
          cat tools/final-patch/part3-* > /tmp/part3.py
          cat tools/final-patch/part4-* > /tmp/part4.py
          python3 /tmp/part1.py
          python3 /tmp/part2.py
          python3 /tmp/part3.py
          python3 /tmp/part4.py
          nix profile add nixpkgs#devenv
          devenv tasks run maintenance:fix
          git checkout origin/main -- .github/workflows/ci.yml maintenance.nix
          rm -rf tools/final-patch
          rmdir tools 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: expose facade-bound task logs and subagents"
          git push origin HEAD:fix/subagent-tools-task-tree