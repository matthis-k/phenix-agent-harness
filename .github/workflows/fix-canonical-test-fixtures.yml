name: Apply canonical test fixtures

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Apply canonical test fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Make suite defaults explicit in tests
        run: python3 scripts/fix-canonical-test-fixtures.py
      - name: Commit fixture migration
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          rm -f .github/workflows/fix-canonical-test-fixtures.yml
          rm -f scripts/fix-canonical-test-fixtures.py
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "test(pi): make suite defaults explicit"
          git push origin "HEAD:${HEAD_BRANCH}"
