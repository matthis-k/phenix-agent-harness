id: no-raw-subagent
language: TypeScript
message: "Use phenix_workflow node and edge operations. Raw subagent calls are runtime-blocked."
severity: error
rule:
  pattern: subagent({$$$ARGS})
note: |
  Raw subagent tool calls are blocked at runtime in Phenix.
  Inspect the current workflow node and take one legal spawn edge instead. The
  workflow runtime owns model selection, thinking, permissions, persistence,
  contracts, and verification.
