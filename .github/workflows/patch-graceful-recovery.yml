name: Patch graceful child recovery

on:
  push:
    branches:
      - feat/graceful-child-recovery
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.event_name == 'pull_request' || !contains(github.event.head_commit.message, '[skip recovery correction]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: feat/graceful-child-recovery
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Apply recovery corrections
        shell: bash
        run: |
          set -o pipefail
          python .github/fix-recovery-correction.py
          python .github/correct-graceful-recovery.py 2>&1 | tee recovery-correction.log
      - name: Upload correction diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: graceful-recovery-correction-log
          path: recovery-correction.log
      - name: Format corrected sources
        run: |
          nix shell github:NixOS/nixpkgs/0bb7ec54c8483066ec9d7720e780a5caa71f8612#biome -c \
            biome check --write --unsafe --config-path biome.json --no-errors-on-unmatched \
            --files-ignore-unknown=true \
            modules/phenix-pi/application/agent-executor.ts \
            modules/phenix-pi/application/execution-facade.ts \
            modules/phenix-pi/composition/create-phenix-runtime.ts \
            modules/phenix-pi/extension/root-extension.ts
      - name: Commit corrected sources
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No corrections required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules
          git commit --no-verify -m "[skip recovery correction] fix: harden graceful recovery"
          git push origin HEAD:feat/graceful-child-recovery
