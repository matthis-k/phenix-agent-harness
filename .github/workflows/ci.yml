name: Apply verified subagent patch

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/subagent-tools-task-tree'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/subagent-tools-task-tree
          fetch-depth: 0
          show-progress: false
      - name: Apply verified patch and clean scaffolding
        run: |
          set -euo pipefail
          python3 tools/apply-subagent-sdk-fix.py
          git checkout origin/main -- .github/workflows/ci.yml maintenance.nix
          rm -f tools/apply-subagent-sdk-fix.py
          rmdir tools 2>/dev/null || true
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: align subagent tools with Pi SDK contracts"
          git push origin HEAD:fix/subagent-tools-task-tree
