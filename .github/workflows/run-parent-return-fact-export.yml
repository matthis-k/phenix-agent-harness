name: Run parent return and fact export patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'fix/parent-return-facts-export-final2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply integration patch
        run: python scripts/apply-parent-return-fact-export.py
      - name: Commit integration patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Fix parent return race and wire fact exports"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
