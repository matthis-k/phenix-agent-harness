phenix_agent_routing:
  version: 1

  defaults:
    mode: auto
    difficulty: auto
    target_state: dev-wallet
    external_plan: auto
    main_bound_requires_verifier: true

  keybindings:
    cycle_routing_mode: ctrl+t
    cycle_difficulty_hint: alt+t
    switch_primary_agent: tab

  modes:
    cycle_order:
      - auto
      - free

    auto:
      description: "All models use opencode/deepseek-v4-flash-free through the Zen provider."
      enabled: true

    free:
      description: "Explicitly use opencode/deepseek-v4-flash-free. Same as auto but explicit."
      enabled: true

  model_slots:
    # All routing uses the free opencode Zen provider with deepseek-v4-flash-free.
    # Different difficulty levels map to the same model; Pi's model registry
    # determines actual capability.
    free_deepseek:
      all: opencode/deepseek-v4-flash-free
      planner: opencode/deepseek-v4-flash-free
      worker: opencode/deepseek-v4-flash-free
      verifier: opencode/deepseek-v4-flash-free
      critic: opencode/deepseek-v4-flash-free

  routing_matrix:
    auto:
      D0:
        planner: free_deepseek.planner
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier

      D1:
        planner: free_deepseek.planner
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier

      D2:
        planner: free_deepseek.planner
        critic: free_deepseek.critic
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier

      D3:
        planner: free_deepseek.planner
        critic: free_deepseek.critic
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier
        final_reviewer: free_deepseek.verifier

    free:
      D0:
        planner: free_deepseek.planner
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier

      D1:
        planner: free_deepseek.planner
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier

      D2:
        planner: free_deepseek.planner
        critic: free_deepseek.critic
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier

      D3:
        planner: free_deepseek.planner
        critic: free_deepseek.critic
        implementer: free_deepseek.worker
        verifier: free_deepseek.verifier
        final_reviewer: free_deepseek.verifier

  difficulty_classifier:
    D0:
      description: "Trivial, reversible, mechanical."
      examples:
        - typo fix
        - formatting
        - docs wording
        - obvious import fix
        - simple rename

    D1:
      description: "Bounded repo-aware change."
      examples:
        - add Nix option plumbing
        - add existing-pattern tests
        - small Rust refactor
        - small QML policy addition
        - docs plus validation command

    D2:
      description: "Architectural or multi-file change."
      examples:
        - routing policy implementation
        - agent state redesign
        - tend/stitch behavior change
        - flake-parts module restructuring
        - MCP integration

    D3:
      description: "High-risk, ambiguous, broad, main-sensitive, or cross-repo."
      examples:
        - newxos migration chunk
        - secrets/sops/auth work
        - CI/release policy
        - repo-wide Nix restructuring
        - workspace/handoff architecture

  secrecy_classifier:
    public:
      allowed_free: true

    private:
      allowed_free: false

    secret:
      allowed_free: false

  change_kind_guards:
    deny_free_for:
      - secrets
      - sops
      - auth
      - ssh
      - tokens
      - ci
      - github_actions
      - deployment
      - permissions
      - security
      - repo_architecture
      - host_config

    require_verifier_for:
      - nix
      - rust
      - workflow
      - tend
      - stitch
      - mcp
      - ci
      - repo_architecture

    require_strong_planner_for:
      - workflow
      - tend
      - stitch
      - mcp
      - repo_architecture
      - secrets
      - permissions

  ctrl_t_behavior:
    action: cycle_routing_mode
    cycles:
      normal:
        - auto
        - free

    status_messages:
      mode_changed: "routing: {mode}"

  external_plan:
    enabled: true
    default: auto

    modes:
      auto:
        description: "Classify prompt as not-a-plan, partial-plan, or complete-plan."

      force:
        description: "Treat prompt as at least a partial external plan and normalize it."

      off:
        description: "Ignore external plan detection and run the normal planner."

    classifier:
      complete_plan:
        requires:
          - explicit_intent
          - bounded_scope
          - ordered_steps_or_task_breakdown
          - constraints_or_invariants
          - validation_expectations
          - sufficient_context_for_implementer

      partial_plan:
        requires_any:
          - explicit_intent
          - bounded_scope
          - ordered_steps_or_task_breakdown
        missing_allowed:
          - invariants
          - validation
          - stop_conditions
          - target_state
          - routing_metadata

      not_a_plan:
        signals:
          - mostly_question
          - broad_goal_only
          - asks_for_design_decision
          - lacks_actionable_steps

    handling:
      complete_plan:
        source: external-complete
        preserve_original: true
        rewrite_style: false
        add_metadata_header: true
        normalize_contract: minimal

      partial_plan:
        source: external-normalized
        preserve_original: true
        rewrite_style: false
        add_planner_normalization: true
        normalize_contract: fill_missing_fields_only

      not_a_plan:
        source: internal-generated
        run_internal_planner: true

    architecture_compliance:
      enabled: true
      normalize_incompatible_external_plan: true
      checks:
        - preserve_existing_module_boundaries
        - keep_model_names_out_of_workflow_logic
        - use_semantic_slots_in_policy
        - keep_concrete_models_in_config
        - preserve_main_dev_separation
        - forbid_free_models_for_private_or_secret_work
        - require_tend_or_stitch_validation_when_relevant
        - avoid_direct_main_promotion_for_D2_D3
        - leave_wallet_or_handoff_state_if_incomplete

    normalized_contract_template:
      required_sections:
        - source
        - intent
        - scope
        - non_goals
        - architecture_constraints
        - steps
        - validation
        - stop_conditions
        - routing_metadata

  planner_contract:
    emit_format: markdown

    routing_metadata:
      include:
        - difficulty
        - secrecy
        - change_kind
        - target_state
        - mode
        - provider_model

    implementer_rules:
      - do_not_expand_scope
      - stop_on_contract_violation
      - stop_if_private_data_reaches_free_model
      - escalate_after_two_same_test_failures
      - escalate_if_unrelated_modules_become_necessary

    verifier_rules:
      - verify_contract_satisfaction
      - verify_external_plan_adjustments_are_minimal
      - verify_routing_policy_was_followed
      - verify_architecture_constraints
      - verify_tests_match_difficulty
      - require_strict_checks_for_main_bound_work

  target_state_policy:
    scratch:
      allow_incomplete: true
      verifier_required: false
      strict_checks: false

    dev-wallet:
      allow_incomplete: true
      verifier_required: true
      strict_checks: false
      require_handoff_state: true

    main-bound:
      allow_incomplete: false
      verifier_required: true
      strict_checks: true
      require_clean_state: true
      deny_D2_D3_direct_main_commit: true

  validation_profiles:
    fast:
      commands:
        - nix flake check --no-build

    normal:
      commands:
        - nix flake check
        - cargo test --all

    strict:
      commands:
        - nix flake check
        - cargo test --all
        - cargo clippy --all-targets --all-features -- -D warnings
        - cargo fmt --all --check

  tests:
    required_cases:
      - "All difficulty levels use opencode/deepseek-v4-flash-free."
      - "Free model is denied for private and secret work."
      - "D2 and D3 work still runs full planner/verifier pipeline."
      - "All routing uses the same deepseek v4 flash free model."
      - "No codex, GPT, or Go models are configured."