name: Normalize compiler alignment changes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out type branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/05-types-and-identifiers
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply deterministic formatting
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/tsconfig.json \
            modules/phenix-pi/extensions/optional-integrations.d.ts \
            modules/phenix-pi/extensions/phenix-composition/root-workflow-integration.ts \
            modules/phenix-pi/extensions/phenix-contracts/validator.ts \
            modules/phenix-pi/extensions/phenix-routing/index.ts \
            modules/phenix-pi/extensions/phenix-routing/provider.ts \
            modules/phenix-pi/extensions/phenix-routing/stream-proxy.ts \
            modules/phenix-pi/extensions/phenix-runtime/child-session-resources.ts \
            modules/phenix-pi/extensions/phenix-runtime/delegation-tool.ts \
            modules/phenix-pi/extensions/phenix-subagents/coordinator.ts \
            modules/phenix-pi/extensions/phenix-subagents/delegate-schema.ts \
            modules/phenix-pi/extensions/phenix-subagents/index.ts \
            modules/phenix-pi/extensions/phenix.ts
          nix run nixpkgs#nixfmt -- modules/pi-packages.nix
          nix run nixpkgs#shfmt -- -w -i 2 -ci scripts/check.sh

      - name: Commit normalized source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules scripts/check.sh
          git diff --cached --check
          git commit -m "style(types): normalize compiler alignment"
          git push origin HEAD:qa/05-types-and-identifiers
