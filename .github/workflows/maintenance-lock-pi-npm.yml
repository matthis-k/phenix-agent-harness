name: Generate locked Pi npm dependencies

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out npm branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: build/locked-pi-npm-dependencies
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Generate package lock
        run: |
          nix shell nixpkgs#nodejs -c npm install \
            --prefix modules/pi-npm \
            --package-lock-only \
            --ignore-scripts \
            --no-audit \
            --no-fund

      - name: Apply Nix migration
        run: python .github/maintenance/use-import-npm-lock.py

      - name: Format Nix
        run: nix run nixpkgs#nixfmt -- modules/pi-packages.nix

      - name: Commit generated dependency authority
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            modules/pi-npm/package-lock.json \
            modules/pi-packages.nix
          git diff --cached --check
          git commit -m "build(npm): use lockfile-backed node_modules"
          git push origin HEAD:build/locked-pi-npm-dependencies
