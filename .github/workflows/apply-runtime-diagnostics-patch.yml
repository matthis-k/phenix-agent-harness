name: Apply runtime diagnostics patch

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'fix/runtime-diagnostics-journal-full'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply source and test changes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          def read(path: str) -> str:
              return Path(path).read_text()

          def write(path: str, content: str) -> None:
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content)

          def replace_once(path: str, old: str, new: str) -> None:
              content = read(path)
              count = content.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement, found {count}: {old[:100]!r}")
              write(path, content.replace(old, new, 1))

          def regex_once(path: str, pattern: str, replacement: str, flags: int = 0) -> None:
              content = read(path)
              updated, count = re.subn(pattern, replacement, content, count=1, flags=flags)
              if count != 1:
                  raise SystemExit(f"{path}: expected one regex replacement, found {count}: {pattern}")
              write(path, updated)

          normalizer = "modules/phenix-pi/packages/phenix-suite/runtime/session-event-normalizer.ts"
          replace_once(
              normalizer,
              '  readonly messages?: readonly unknown[];\n}',
              '  readonly messages?: readonly unknown[];\n  readonly stopReason?: unknown;\n}',
          )
          replace_once(
              normalizer,
              '''/** Determine whether a Pi event indicates a provider/model failure. */\nexport function isFailureEvent(raw: PiAgentEvent): boolean {\n  return raw.type === "error" || (raw.type === "agent_end" && raw.error != null);\n}\n''',
              '''function nestedFailure(value: unknown): boolean {\n  if (typeof value !== "object" || value === null) return false;\n  const record = value as Record<string, unknown>;\n  return (\n    record.stopReason === "error" ||\n    record.error != null ||\n    (typeof record.errorMessage === "string" && record.errorMessage.trim().length > 0)\n  );\n}\n\n/** Determine whether a Pi event indicates a provider/model failure. */\nexport function isFailureEvent(raw: PiAgentEvent): boolean {\n  if (raw.type === "error" || raw.stopReason === "error") return true;\n  if (raw.error != null || raw.errorMessage != null) return true;\n  if (nestedFailure(raw.message)) return true;\n  return raw.messages?.some(nestedFailure) ?? false;\n}\n''',
          )

          rpc_peer = "modules/phenix-pi/packages/phenix-suite/runtime/rpc-jsonl-peer.ts"
          replace_once(
              rpc_peer,
              '''interface PendingCommand {\n  readonly command: string;\n  readonly resolve: (response: RpcResponse) => void;\n  readonly reject: (error: Error) => void;\n  readonly timeout: NodeJS.Timeout;\n  readonly detachAbort?: () => void;\n}\n''',
              '''interface PendingCommand {\n  readonly command: string;\n  readonly resolve: (response: RpcResponse) => void;\n  readonly reject: (error: Error) => void;\n  readonly timeout: NodeJS.Timeout;\n  readonly detachAbort?: () => void;\n}\n\nexport interface RpcJsonlPeerOptions {\n  /** Allow the child-process close/error event to supply a richer failure than stdout EOF. */\n  readonly endErrorDelayMs?: number;\n}\n''',
          )
          replace_once(
              rpc_peer,
              '''  private buffer = "";\n  private terminalError: Error | undefined;\n\n  constructor(input: Readable, output: Writable) {\n    this.input = input;\n    this.output = output;\n''',
              '''  private buffer = "";\n  private terminalError: Error | undefined;\n  private readonly endErrorDelayMs: number;\n  private endErrorTimer: NodeJS.Timeout | undefined;\n\n  constructor(input: Readable, output: Writable, options: RpcJsonlPeerOptions = {}) {\n    this.input = input;\n    this.output = output;\n    this.endErrorDelayMs = options.endErrorDelayMs ?? 250;\n''',
          )
          replace_once(
              rpc_peer,
              '''  close(reason: Error = new RpcProtocolError("Pi RPC peer closed.")): void {\n    this.fail(reason);\n  }\n\n  dispose(): void {\n''',
              '''  close(reason: Error = new RpcProtocolError("Pi RPC peer closed.")): void {\n    this.clearEndErrorTimer();\n    this.fail(reason);\n  }\n\n  dispose(): void {\n    this.clearEndErrorTimer();\n''',
          )
          replace_once(
              rpc_peer,
              '''  private readonly onEnd = (): void => {\n    if (this.buffer.length > 0) {\n      this.fail(new RpcProtocolError("Pi RPC stream ended with an unterminated JSON record."));\n      return;\n    }\n    this.fail(new RpcProtocolError("Pi RPC stdout ended."));\n  };\n''',
              '''  private readonly onEnd = (): void => {\n    const error =\n      this.buffer.length > 0\n        ? new RpcProtocolError("Pi RPC stream ended with an unterminated JSON record.")\n        : new RpcProtocolError("Pi RPC stdout ended.");\n    if (this.endErrorDelayMs <= 0) {\n      this.fail(error);\n      return;\n    }\n    this.clearEndErrorTimer();\n    this.endErrorTimer = setTimeout(() => this.fail(error), this.endErrorDelayMs);\n    this.endErrorTimer.unref?.();\n  };\n''',
          )
          replace_once(
              rpc_peer,
              '''  private fail(error: Error): void {\n    if (this.terminalError) return;\n    this.terminalError = error;\n''',
              '''  private clearEndErrorTimer(): void {\n    if (!this.endErrorTimer) return;\n    clearTimeout(this.endErrorTimer);\n    this.endErrorTimer = undefined;\n  }\n\n  private fail(error: Error): void {\n    if (this.terminalError) return;\n    this.clearEndErrorTimer();\n    this.terminalError = error;\n''',
          )

          rpc_backend = "modules/phenix-pi/packages/phenix-suite/runtime/rpc-child-session-backend.ts"
          replace_once(
              rpc_backend,
              '''function runtimePreference(): "sdk" | "rpc" | undefined {\n  const value = process.env.PHENIX_CHILD_BACKEND?.trim().toLowerCase();\n  return value === "sdk" || value === "rpc" ? value : undefined;\n}\n''',
              '''function runtimePreference(): "sdk" | "rpc" | undefined {\n  const value = process.env.PHENIX_CHILD_BACKEND?.trim().toLowerCase();\n  return value === "sdk" || value === "rpc" ? value : undefined;\n}\n\ninterface RpcLaunchDescription {\n  readonly command: string;\n  readonly args: readonly string[];\n}\n\nfunction sanitizedArgs(args: readonly string[]): readonly string[] {\n  const result: string[] = [];\n  let redactNext = false;\n  for (const argument of args) {\n    if (redactNext) {\n      result.push("[redacted]");\n      redactNext = false;\n      continue;\n    }\n    result.push(argument);\n    if (/^--.*(?:token|secret|password|api[-_]?key)$/i.test(argument)) redactNext = true;\n  }\n  return result;\n}\n\nfunction launchDiagnostic(\n  launch: RpcLaunchDescription,\n  process: ChildProcessWithoutNullStreams,\n  initialized: boolean,\n): string {\n  return [\n    `command=${launch.command}`,\n    `args=${JSON.stringify(sanitizedArgs(launch.args))}`,\n    `pid=${process.pid ?? "unknown"}`,\n    `rpcState=${initialized ? "initialized" : "initializing"}`,\n  ].join(", ");\n}\n''',
          )
          replace_once(
              rpc_backend,
              '''  private readonly unsubscribePeerErrors: () => void;\n\n  constructor(process: ChildProcessWithoutNullStreams, peer: RpcJsonlPeer, spec: ChildSessionSpec) {\n    this.process = process;\n    this.peer = peer;\n    this.spec = spec;\n''',
              '''  private readonly unsubscribePeerErrors: () => void;\n  private readonly launch: RpcLaunchDescription;\n  private initialized = false;\n\n  constructor(\n    process: ChildProcessWithoutNullStreams,\n    peer: RpcJsonlPeer,\n    spec: ChildSessionSpec,\n    launch: RpcLaunchDescription,\n  ) {\n    this.process = process;\n    this.peer = peer;\n    this.spec = spec;\n    this.launch = launch;\n''',
          )
          regex_once(
              rpc_backend,
              r'''    this\.unsubscribePeerErrors = peer\.subscribeErrors\(\(error\) => \{\n      void this\.fail\(new ChildRuntimeError\("ORPHANED_SESSION", error\.message, \{ cause: error \}\)\);\n    \}\);\n    process\.stderr\.setEncoding\("utf8"\);\n    process\.stderr\.on\("data", \(chunk\) => \{\n      this\.stderr = `\$\{this\.stderr\}\$\{String\(chunk\)\}`\.slice\(-16_000\);\n    \}\);\n    process\.once\("error", \(error\) => \{\n      void this\.fail\(\n        new ChildRuntimeError\("SESSION_START_FAILED", `Pi RPC process failed: \$\{error\.message\}`, \{\n          cause: error,\n        \}\),\n      \);\n    \}\);\n    process\.once\("exit", \(code, signal\) => \{\n      if \(this\.disposed \|\| this\.status === "cancelled" \|\| this\.status === "disposed"\) return;\n      const detail = \[\n        `Pi RPC process exited\$\{code === null \? "" : ` with code \$\{code\}`\}\$\{signal \? ` \(\$\{signal\}\)` : ""\}\.`,\n        this\.stderr\.trim\(\),\n      \]\n        \.filter\(Boolean\)\n        \.join\("\\n"\);\n      void this\.fail\(\n        new ChildRuntimeError\(\n          this\.status === "starting" \? "SESSION_START_FAILED" : "ORPHANED_SESSION",\n          detail,\n        \),\n      \);\n    \}\);''',
              '''    this.unsubscribePeerErrors = peer.subscribeErrors((error) => {\n      const failure =\n        error instanceof ChildRuntimeError\n          ? error\n          : new ChildRuntimeError("ORPHANED_SESSION", error.message, { cause: error });\n      void this.fail(failure);\n    });\n    process.stderr.setEncoding("utf8");\n    process.stderr.on("data", (chunk) => {\n      this.stderr = `${this.stderr}${String(chunk)}`.slice(-16_000);\n    });\n    process.once("error", (error) => {\n      const failure = new ChildRuntimeError(\n        "SESSION_START_FAILED",\n        `Pi RPC process failed: ${error.message}. ${launchDiagnostic(this.launch, process, this.initialized)}`,\n        { cause: error },\n      );\n      this.peer.close(failure);\n      void this.fail(failure);\n    });\n    process.once("close", (code, signal) => {\n      if (this.disposed || this.status === "cancelled" || this.status === "disposed") return;\n      const detail = [\n        `Pi RPC process closed${code === null ? "" : ` with code ${code}`}${signal ? ` (${signal})` : ""}.`,\n        launchDiagnostic(this.launch, process, this.initialized),\n        this.stderr.trim(),\n      ]\n        .filter(Boolean)\n        .join("\\n");\n      const failure = new ChildRuntimeError(\n        this.status === "starting" ? "SESSION_START_FAILED" : "ORPHANED_SESSION",\n        detail,\n      );\n      this.peer.close(failure);\n      void this.fail(failure);\n    });''',
              flags=re.MULTILINE,
          )
          replace_once(
              rpc_backend,
              '''    this.status = "running";\n    this.emit({ type: "session.started", runId: this.id, pi: this.pi });\n''',
              '''    this.initialized = true;\n    this.status = "running";\n    this.emit({ type: "session.started", runId: this.id, pi: this.pi });\n''',
          )
          replace_once(
              rpc_backend,
              '''    const peer = new RpcJsonlPeer(processHandle.stdout, processHandle.stdin);\n    const run = new RpcChildRun(processHandle, peer, spec);\n''',
              '''    const peer = new RpcJsonlPeer(processHandle.stdout, processHandle.stdin);\n    const run = new RpcChildRun(processHandle, peer, spec, { command: this.command, args });\n''',
          )

          task_backend = "modules/phenix-pi/packages/phenix-suite/tasks/task-child-session-backend.ts"
          replace_once(
              task_backend,
              '''        `Child backend starting: backend=${input.delegate.kind}, run=${spec.id}, model=${spec.model.provider}/${spec.model.id}, thinking=${spec.thinkingLevel}.`,\n''',
              '''        `Child backend starting: backend=auto, preferred=${spec.isolationRequired ? "rpc" : "sdk"}, run=${spec.id}, model=${spec.model.provider}/${spec.model.id}, thinking=${spec.thinkingLevel}.`,\n''',
          )

          handle_types = "modules/phenix-pi/packages/phenix-suite/subagents/handle-types.ts"
          replace_once(
              handle_types,
              '''  status: HandleStatus;\n  value?: unknown;\n  errors?: string[];\n\n  verification?: VerificationSummary;\n''',
              '''  status: HandleStatus;\n  value?: unknown;\n  /** Schema-valid producer output retained even when a later assurance stage is unavailable. */\n  candidateValue?: unknown;\n  assuranceFailure?: {\n    readonly stage: "critic";\n    readonly code: string;\n    readonly message: string;\n  };\n  errors?: string[];\n\n  verification?: VerificationSummary;\n''',
          )

          producer = "modules/phenix-pi/packages/phenix-suite/subagents/producer-cycle-runner.ts"
          replace_once(
              producer,
              '''    if (record.producerSpec.criticRequired && !criticFactory) {\n''',
              '''    record.candidateValue = submitted.value;\n    record.assuranceFailure = undefined;\n    writeRecord(cwd, record);\n\n    if (record.producerSpec.criticRequired && !criticFactory) {\n''',
          )
          replace_once(
              producer,
              '''      record.status = "failed";\n      record.errors = ["Required critic runner is not configured."];\n''',
              '''      record.status = "failed";\n      record.assuranceFailure = {\n        stage: "critic",\n        code: cycleRecord.error.code,\n        message: cycleRecord.error.message,\n      };\n      record.errors = ["Required critic runner is not configured; producer result preserved as candidateValue."];\n''',
          )
          replace_once(
              producer,
              '''        cycleRecord.endedAt = now();\n        cycleRecord.status = "failed";\n        cycleRecord.error = serializeError(error);\n        record.status = "failed";\n        record.errors = [error instanceof Error ? error.message : String(error)];\n        writeRecord(cwd, record);\n        return { ok: false, status: "failed", error: serializeError(error), record };\n''',
              '''        const serialized = serializeError(error);\n        cycleRecord.endedAt = now();\n        cycleRecord.status = "failed";\n        cycleRecord.error = serialized;\n        record.status = "failed";\n        record.assuranceFailure = {\n          stage: "critic",\n          code: serialized.code,\n          message: serialized.message,\n        };\n        record.errors = [\n          `${serialized.code}: ${serialized.message}`,\n          "Producer result passed schema and deterministic verification and was preserved as candidateValue.",\n        ];\n        writeRecord(cwd, record);\n        return {\n          ok: false,\n          status: "failed",\n          value: submitted.value,\n          error: serialized,\n          record,\n        };\n''',
          )
          replace_once(
              producer,
              '''    record.value = submitted.value;\n    record.status = "completed";\n''',
              '''    record.value = submitted.value;\n    record.candidateValue = undefined;\n    record.assuranceFailure = undefined;\n    record.status = "completed";\n''',
          )

          acceptance = "modules/phenix-pi/packages/phenix-suite/subagents/workflow-acceptance-engine.ts"
          replace_once(
              acceptance,
              '''      const message = result.error?.message ?? `Producer execution ${result.status}.`;\n      throw new SubagentExecutionError(code, message, {\n''',
              '''      const baseMessage = result.error?.message ?? `Producer execution ${result.status}.`;\n      const message = data.record.candidateValue\n        ? `${baseMessage} Producer output is preserved on handle ${data.record.id} as candidateValue; semantic assurance did not complete.`\n        : baseMessage;\n      throw new SubagentExecutionError(code, message, {\n''',
          )

          journal_module = "modules/phenix-pi/packages/phenix-suite/journal/session-tree-journal.ts"
          write(journal_module, '''import fs from "node:fs";\nimport path from "node:path";\n\nimport {\n  sessionExecutionJournalForProject,\n  sessionExecutionJournalPath,\n} from "./session-execution-journal-registry.ts";\nimport type { SessionExecutionEvent } from "./session-execution-journal.ts";\n\ninterface JsonlRow {\n  readonly line: number;\n  readonly value: unknown;\n}\n\nexport interface SessionTreeJournalResult {\n  readonly filePath: string;\n  readonly recordCount: number;\n  readonly sourceFiles: readonly string[];\n}\n\ninterface SessionTreeRecord {\n  readonly schemaVersion: 1;\n  readonly type: "session-tree.record";\n  readonly rootSessionId: string;\n  readonly timestamp: string;\n  readonly sessionId?: string;\n  readonly source: {\n    readonly kind: "execution-journal" | "pi-session";\n    readonly path: string;\n    readonly line: number;\n  };\n  readonly record: unknown;\n}\n\nfunction readJsonl(filePath: string): readonly JsonlRow[] {\n  if (!fs.existsSync(filePath)) return [];\n  const rows: JsonlRow[] = [];\n  for (const [index, line] of fs.readFileSync(filePath, "utf8").split(/\\r?\\n/).entries()) {\n    if (!line.trim()) continue;\n    try {\n      rows.push({ line: index + 1, value: JSON.parse(line) });\n    } catch {\n      rows.push({\n        line: index + 1,\n        value: { type: "invalid-jsonl-record", raw: line },\n      });\n    }\n  }\n  return rows;\n}\n\nfunction recordValue(value: unknown, key: string): unknown {\n  if (typeof value !== "object" || value === null) return undefined;\n  return (value as Record<string, unknown>)[key];\n}\n\nfunction recordString(value: unknown, key: string): string | undefined {\n  const candidate = recordValue(value, key);\n  return typeof candidate === "string" && candidate.length > 0 ? candidate : undefined;\n}\n\nfunction recordTimestamp(value: unknown, fallback: string): string {\n  return (\n    recordString(value, "timestamp") ??\n    recordString(recordValue(value, "message"), "timestamp") ??\n    fallback\n  );\n}\n\nfunction sessionIdFromRows(rows: readonly JsonlRow[]): string | undefined {\n  for (const row of rows) {\n    if (recordString(row.value, "type") !== "session") continue;\n    const id = recordString(row.value, "id");\n    if (id) return id;\n  }\n  return undefined;\n}\n\nfunction sessionFilesFromEvents(\n  events: readonly SessionExecutionEvent[],\n  rootSessionFile: string | undefined,\n): readonly string[] {\n  const files = new Set<string>();\n  if (rootSessionFile) files.add(path.resolve(rootSessionFile));\n  for (const event of events) {\n    const payload = event.payload;\n    const direct = payload && typeof payload.sessionFile === "string" ? payload.sessionFile : undefined;\n    const pi = payload?.pi;\n    const nested =\n      typeof pi === "object" && pi !== null && typeof (pi as Record<string, unknown>).sessionFile === "string"\n        ? ((pi as Record<string, unknown>).sessionFile as string)\n        : undefined;\n    if (direct) files.add(path.resolve(direct));\n    if (nested) files.add(path.resolve(nested));\n  }\n  return [...files].filter((candidate) => fs.existsSync(candidate)).sort();\n}\n\n/** Materialize one chronological JSONL containing canonical events and every known Pi session file. */\nexport function generateSessionTreeJournal(input: {\n  readonly cwd: string;\n  readonly rootSessionId: string;\n  readonly rootSessionFile?: string;\n}): SessionTreeJournalResult {\n  const journal = sessionExecutionJournalForProject(input.cwd, input.rootSessionId);\n  const events = journal.readAll();\n  const journalPath = sessionExecutionJournalPath(input.cwd, input.rootSessionId);\n  const sources = sessionFilesFromEvents(events, input.rootSessionFile);\n  const records: SessionTreeRecord[] = events.map((event) => ({\n    schemaVersion: 1,\n    type: "session-tree.record",\n    rootSessionId: input.rootSessionId,\n    timestamp: event.timestamp,\n    sessionId: event.sessionId,\n    source: { kind: "execution-journal", path: journalPath, line: event.sequence },\n    record: event,\n  }));\n\n  for (const sourcePath of sources) {\n    const rows = readJsonl(sourcePath);\n    const sessionId = sessionIdFromRows(rows);\n    for (const row of rows) {\n      records.push({\n        schemaVersion: 1,\n        type: "session-tree.record",\n        rootSessionId: input.rootSessionId,\n        timestamp: recordTimestamp(row.value, "9999-12-31T23:59:59.999Z"),\n        ...(sessionId ? { sessionId } : {}),\n        source: { kind: "pi-session", path: sourcePath, line: row.line },\n        record: row.value,\n      });\n    }\n  }\n\n  records.sort((left, right) =>\n    left.timestamp.localeCompare(right.timestamp) ||\n    left.source.kind.localeCompare(right.source.kind) ||\n    left.source.path.localeCompare(right.source.path) ||\n    left.source.line - right.source.line,\n  );\n\n  const filePath = path.join(path.dirname(journalPath), "full.jsonl");\n  const temporary = `${filePath}.tmp-${process.pid}`;\n  fs.mkdirSync(path.dirname(filePath), { recursive: true, mode: 0o700 });\n  fs.writeFileSync(temporary, records.map((record) => JSON.stringify(record)).join("\\n") + "\\n", {\n    encoding: "utf8",\n    mode: 0o600,\n  });\n  fs.renameSync(temporary, filePath);\n  return {\n    filePath,\n    recordCount: records.length,\n    sourceFiles: [journalPath, ...sources],\n  };\n}\n''')

          extension = "modules/phenix-pi/packages/phenix-suite/extension.ts"
          replace_once(
              extension,
              '''} from "./journal/session-execution-journal-registry.ts";\nimport { buildPhenixRootSystemPrompt } from "./phenix-skill-bootstrap.ts";\n''',
              '''} from "./journal/session-execution-journal-registry.ts";\nimport { generateSessionTreeJournal } from "./journal/session-tree-journal.ts";\nimport { buildPhenixRootSystemPrompt } from "./phenix-skill-bootstrap.ts";\n''',
          )
          replace_once(
              extension,
              '''function exists(candidate: string): boolean {\n''',
              '''function currentSessionFile(ctx: ExtensionContext): string | undefined {\n  const manager = ctx.sessionManager as unknown as {\n    readonly sessionFile?: string;\n    getSessionFile?: () => string | undefined;\n  };\n  try {\n    return manager.getSessionFile?.() ?? manager.sessionFile;\n  } catch {\n    return manager.sessionFile;\n  }\n}\n\nfunction exists(candidate: string): boolean {\n''',
          )
          replace_once(
              extension,
              '''      payload: {\n        journalPath: sessionExecutionJournalPath(ctx.cwd, rootSessionId),\n        ...(ctx.model ? { model: { provider: ctx.model.provider, id: ctx.model.id } } : {}),\n      },\n''',
              '''      payload: {\n        journalPath: sessionExecutionJournalPath(ctx.cwd, rootSessionId),\n        ...(currentSessionFile(ctx) ? { sessionFile: currentSessionFile(ctx) } : {}),\n        ...(ctx.model ? { model: { provider: ctx.model.provider, id: ctx.model.id } } : {}),\n      },\n''',
          )
          replace_once(
              extension,
              '''    description: "Inspect the Phenix coding substrate; usage: /phenix doctor|journal",\n''',
              '''    description: "Inspect the Phenix coding substrate; usage: /phenix doctor|journal|journal-full",\n''',
          )
          replace_once(
              extension,
              '''      if (action === "journal") {\n        ctx.ui.notify(`Root-session execution journal: ${journalPath}`, "info");\n        return;\n      }\n      if (action !== "doctor") {\n        ctx.ui.notify("Usage: /phenix doctor|journal", "warning");\n''',
              '''      if (action === "journal") {\n        ctx.ui.notify(`Root-session execution journal: ${journalPath}`, "info");\n        return;\n      }\n      if (action === "journal-full") {\n        const result = generateSessionTreeJournal({\n          cwd: ctx.cwd,\n          rootSessionId,\n          ...(currentSessionFile(ctx) ? { rootSessionFile: currentSessionFile(ctx) } : {}),\n        });\n        ctx.ui.notify(\n          `Merged session-tree journal (${result.recordCount} records from ${result.sourceFiles.length} source files): ${result.filePath}`,\n          "info",\n        );\n        return;\n      }\n      if (action !== "doctor") {\n        ctx.ui.notify("Usage: /phenix doctor|journal|journal-full", "warning");\n''',
          )

          rpc_test = "modules/phenix-pi/tests/rpc-jsonl-peer.test.ts"
          replace_once(
              rpc_test,
              '''  it("rejects an unterminated record at EOF", async () => {\n    const { fromPi, peer } = pair();\n    const result = peer.command({ type: "get_state" });\n    fromPi.end('{"type":"agent_start"}');\n    await assert.rejects(result, /unterminated JSON record/);\n    peer.dispose();\n  });\n''',
              '''  it("rejects an unterminated record at EOF", async () => {\n    const { fromPi, peer } = pair();\n    const result = peer.command({ type: "get_state" });\n    fromPi.end('{"type":"agent_start"}');\n    await assert.rejects(result, /unterminated JSON record/);\n    peer.dispose();\n  });\n\n  it("allows a richer process-close error to supersede stdout EOF", async () => {\n    const fromPi = new PassThrough();\n    const toPi = new PassThrough();\n    const peer = new RpcJsonlPeer(fromPi, toPi, { endErrorDelayMs: 50 });\n    const result = peer.command({ type: "get_state" });\n    fromPi.end();\n    peer.close(new Error("process closed with code 2; stderr=bad flag"));\n    await assert.rejects(result, /process closed with code 2; stderr=bad flag/);\n    peer.dispose();\n  });\n''',
          )

          task_test = "modules/phenix-pi/tests/task-child-session-backend.test.ts"
          replace_once(
              task_test,
              '''    assert.match(messages, /Child backend starting: backend=sdk/);\n''',
              '''    assert.match(messages, /Child backend starting: backend=auto, preferred=sdk/);\n''',
          )

          write("modules/phenix-pi/tests/session-event-normalizer.test.ts", '''import assert from "node:assert/strict";\nimport { describe, it } from "node:test";\n\nimport {\n  isFailureEvent,\n  providerFailureFromPiEvent,\n} from "../packages/phenix-suite/runtime/session-event-normalizer.ts";\n\ndescribe("session event provider failures", () => {\n  it("recognizes an assistant message that settled with stopReason error", () => {\n    const event = {\n      type: "message_end",\n      message: {\n        role: "assistant",\n        stopReason: "error",\n        errorMessage: "400: upstream request failed",\n      },\n    };\n    assert.equal(isFailureEvent(event), true);\n    assert.deepEqual(providerFailureFromPiEvent(event), {\n      code: "PROVIDER_FAILED",\n      message: "400: upstream request failed",\n    });\n  });\n\n  it("does not classify an ordinary settled message as a provider failure", () => {\n    assert.equal(\n      isFailureEvent({ type: "message_end", message: { role: "assistant", stopReason: "stop" } }),\n      false,\n    );\n  });\n});\n''')

          runtime_test = "modules/phenix-pi/tests/runtime-finalization.test.ts"
          replace_once(
