name: Normalize harness maintenance PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  normalize:
    if: github.event.pull_request.head.ref == 'refactor/standalone-devenv-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refactor/standalone-devenv-maintenance
          fetch-depth: 0
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - run: nix profile add nixpkgs#devenv
      - name: Apply safe maintenance fixes
        shell: bash
        run: |
          set +e
          devenv tasks run maintenance:fix > normalize.log 2>&1
          status=$?
          tail -n 260 normalize.log
          if (( status != 0 )); then
            exit "$status"
          fi
          set -euo pipefail
          nix flake lock
          rm .github/workflows/normalize-maintenance-pr.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --quiet || git commit -m "chore: normalize standalone maintenance"
          git push origin HEAD:refactor/standalone-devenv-maintenance
      - name: Upload normalization diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: harness-normalize-log
          path: normalize.log
          if-no-files-found: error
