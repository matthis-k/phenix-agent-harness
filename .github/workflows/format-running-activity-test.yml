name: Format running activity regression

on:
  push:
    branches: [feat/running-activity-line]

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4
        with:
          ref: feat/running-activity-line
      - name: Remove extra blank line
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("modules/phenix-pi/tests/run-monitor.test.ts")
          text = path.read_text()
          old = '});\n\n\ntest("running nodes render current activity on a separate indented line"'
          new = '});\n\ntest("running nodes render current activity on a separate indented line"'
          if old not in text:
              raise SystemExit("formatting marker not found")
          path.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/format-running-activity-test.yml
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/phenix-pi/tests/run-monitor.test.ts .github/workflows/format-running-activity-test.yml
          git commit -m "Format running activity regression"
          git push origin HEAD:feat/running-activity-line
