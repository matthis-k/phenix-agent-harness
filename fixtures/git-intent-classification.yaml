# Test fixtures for Git action classifier decision table
# These document expected behavior for the classify_intent function.

cases:
  - id: intent-clean-workspace-status
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: status
    expected:
      action: NothingToDo
      mutation: false
      push: false
    notes: Clean workspace with status intent returns NothingToDo.

  - id: intent-clean-workspace-commit
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: commit
    expected:
      action: NothingToDo
      mutation: false
      push: false
    notes: Clean workspace with commit intent returns NothingToDo.

  - id: intent-clean-workspace-sync
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: sync
    expected:
      action: NothingToDo
      mutation: false
      push: false
    notes: Clean workspace with sync intent returns NothingToDo.

  - id: intent-dirty-repos-commit
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: commit
    expected:
      action: LocalCommit
      mutation: true
      push: false
    notes: Dirty repos with commit intent produces LocalCommit action.

  - id: intent-dirty-repos-local-commit
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: local-commit
    expected:
      action: LocalCommit
      mutation: true
      push: false
    notes: Explicit local-commit intent also produces LocalCommit.

  - id: intent-dirty-repos-commit-and-push
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: sync
    expected:
      action: SyncAndPush
      mutation: true
      push: true
      propagates_downstream: true
    notes: Dirty repos with sync intent produces SyncAndPush. For "commit and push", use separate commit then push steps.

  - id: intent-ahead-commits-push
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: true
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: push
    expected:
      action: PushLocalCommits
      mutation: false
      push: true
    notes: Ahead commits with push intent produces PushLocalCommits.

  - id: intent-ahead-commits-commit
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: true
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: commit
    expected:
      action: NothingToDo
      suggestion: push
    notes: No dirty changes but ahead commits; commit gives NothingToDo and should suggest push.

  - id: intent-ahead-dirty-sync
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: true
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: sync
    expected:
      action: SyncAndPush
      mutation: true
      push: true
      propagates_downstream: true
    notes: Dirty + ahead with sync produces SyncAndPush.

  - id: intent-remote-ahead-blocks
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: true
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: commit
    expected:
      action: Blocked
      blocker: RemoteAheadRequiresPullOrRebase
    notes: Remote ahead blocks any mutation. User must pull/rebase first.

  - id: intent-gitlink-mismatch-blocks
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: true
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: commit
    expected:
      action: Blocked
      blocker: FlakeLockGitlinkMismatch
    notes: Gitlink mismatch blocks commit. Run check-locks first to diagnose.

  - id: intent-unpublished-lock-refs-push
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: true
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: true
    user_says: push
    expected:
      action: Blocked
      blocker: UnpublishedLockRef
      remedies:
        - push lower-level repos first in DAG order
        - or enable local_dag_publish_mode
    notes: Pushing is blocked when flake.lock references commits not yet on remote.

  - id: intent-sync-no-push
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: sync-no-push
    expected:
      action: SyncNoPush
      mutation: true
      push: false
      propagates_downstream: true
    notes: sync-no-push updates inputs and commits locally but does not push.

  - id: intent-update-submodules
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: update-submodules
    expected:
      action: UpdateSubmodulesToRemote
      mutation: true
      push: false
    notes: Explicit update-submodules intent produces UpdateSubmodulesToRemote.

  - id: intent-update-submodules-dirty-blocks
    workspace_state:
      has_dirty_changes: true
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: update-submodules
    expected:
      action: Blocked
      blocker: DirtyUnplannedChanges
    notes: Dirty workspace blocks submodule update. Commit or stash first.

  - id: intent-sync-up-submodules-clean
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: false
      has_flake_lock_mismatch: false
      has_unpublished_lock_refs: false
    user_says: sync-up-submodules
    expected:
      action: inspect_remote_submodule_updates
      require_confirmation_before_checkout: true
    notes: '"sync up submodules" is ambiguous with clean workspace. Must inspect first, not mutate.'

  - id: intent-repair-locks
    workspace_state:
      has_dirty_changes: false
      has_local_ahead_commits: false
      has_remote_ahead_commits: false
      has_gitlink_mismatch: true
      has_flake_lock_mismatch: true
      has_unpublished_lock_refs: false
    user_says: repair-locks
    expected:
      action: RepairLockGitlinkMismatch
      mutation: true
      push: false
    notes: repair-locks fixes flake lock / gitlink mismatches when gitlink != checkout or lock != gitlink.

  - id: intent-forbidden-raw-submodule-update
    user_says: git submodule update --remote
    expected:
      action: Blocked
      blocker: AmbigousIntent
      require_explicit_tool: stitch update-submodules --remote
    notes: Raw git submodule update --remote is forbidden. Use explicit stitch command.

  - id: intent-terminology-commit-means-local-commit
    user_says: commit
    expected:
      interpretation: local_commit
      meaning: Creates commits only; no push.
    notes: Plain "commit" in workflow always means local_commit.

  - id: intent-terminology-commit-and-push
    user_says: commit and push
    expected:
      interpretation: local_commit_then_push
      meaning: Local commit then push.
    notes: '"commit and push" is explicit - both steps required.'
