name: Apply workflow session runtime migration on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'refactor/workflow-session-runtime' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply migration
        run: python .github/apply-workflow-session-runtime.py

      - name: Commit migration
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi/extensions/phenix.ts \
            modules/phenix-pi/extensions/phenix-subagents/coordinator.ts
          git commit -m "refactor(workflow): create producers through session runtime"
          git push origin HEAD:${{ github.head_ref }}
