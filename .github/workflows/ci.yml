name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Direct repository checks
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with: { fetch-depth: 0 }
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Runtime tests including packaged RPC smoke
        run: nix build --no-link --print-build-logs .#phenix-runtime-tests
      - name: Typecheck
        run: nix build --no-link --print-build-logs .#phenix-typecheck
      - name: Format and statix
        shell: bash
        run: |
          set +e
          nix shell nixpkgs#biome nixpkgs#nixfmt nixpkgs#statix --command bash -euo pipefail -c '
            find . -type f -name "*.nix" -not -path "./.git/*" -not -path "./.devenv/*" -not -path "*/node_modules/*" -exec nixfmt --check {} +
            biome ci --config-path biome.json --no-errors-on-unmatched --files-ignore-unknown=true --error-on-warnings biome.json modules
            statix check --ignore ".git/**"
          ' > format-check.log 2>&1
          status=$?
          cat format-check.log
          exit "$status"
      - name: Upload format diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: format-check-log
          path: format-check.log
          if-no-files-found: ignore
