name: Fix contract-store resolver typing

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out persistence branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/08-persistence-boundaries
          fetch-depth: 0

      - name: Fix resolver declaration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("modules/phenix-pi/extensions/phenix-subagents/contract-store.ts")
          content = path.read_text()
          old = "    let resolve: () => void;"
          new = "    let resolve: (() => void) | undefined;"
          if content.count(old) != 1:
              raise RuntimeError(f"expected one resolver declaration, found {content.count(old)}")
          path.write_text(content.replace(old, new, 1))
          PY

      - name: Commit source file
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi/extensions/phenix-subagents/contract-store.ts
          git diff --cached --check
          git commit -m "fix(persistence): type queued contract resolver"
          git push origin HEAD:qa/08-persistence-boundaries
