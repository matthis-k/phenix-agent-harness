name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Deterministic checks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Tend profiles
        run: nix run .#tend -- validate --profiles

      - name: Check changed files without modifying them
        id: changed-files
        shell: bash
        run: |
          set -uo pipefail
          zero_sha="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "$zero_sha" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          else
            base="${{ github.sha }}^"
            head="${{ github.sha }}"
          fi

          nix run .#phenix-check -- range "$base" "$head" > changed-files.log 2>&1
          status=$?
          cat changed-files.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload changed-file diagnostics
        if: steps.changed-files.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: changed-file-diagnostics
          path: changed-files.log
          if-no-files-found: error

      - name: Fail when changed-file checks fail
        if: steps.changed-files.outputs.status != '0'
        run: exit 1

      - name: Run TypeScript compiler check
        id: typecheck
        if: steps.changed-files.outputs.status == '0'
        shell: bash
        run: |
          set +e
          nix build --no-link --print-build-logs .#phenix-typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload compiler diagnostics
        if: steps.typecheck.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error

      - name: Fail when compiler check fails
        if: steps.typecheck.outputs.status != '0'
        run: exit 1

      - name: Run remaining flake checks
        if: steps.typecheck.outputs.status == '0'
        run: nix flake check --print-build-logs --keep-going
