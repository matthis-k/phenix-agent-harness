name: Apply single Phenix API cleanup

on:
  push:
    branches:
      - cleanup/single-phenix-api

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Apply cleanup
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('.')

          def read(path: str) -> str:
              return (root / path).read_text()

          def write(path: str, text: str) -> None:
              target = root / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(text)

          def replace(path: str, old: str, new: str, expected: int | None = 1) -> None:
              text = read(path)
              count = text.count(old)
              if expected is not None and count != expected:
                  raise RuntimeError(f'{path}: expected {expected} occurrences, found {count}: {old!r}')
              write(path, text.replace(old, new))

          def regex(path: str, pattern: str, repl: str, expected: int | None = 1, flags: int = 0) -> None:
              text = read(path)
              updated, count = re.subn(pattern, repl, text, flags=flags)
              if expected is not None and count != expected:
                  raise RuntimeError(f'{path}: expected {expected} regex matches, found {count}: {pattern!r}')
              write(path, updated)

          api_version = 'modules/phenix-pi/extensions/phenix-kernel/api-version.ts'
          write(api_version, '''/** Current and only supported Phenix-owned runtime API version. */
          export const PHENIX_API_VERSION = 1 as const;

          export type PhenixApiVersion = typeof PHENIX_API_VERSION;
          '''.replace('          ', ''))

          # Contract artifact and result envelopes share the one package API version.
          p = 'modules/phenix-pi/extensions/phenix-subagents/contract.ts'
          replace(p, 'import { createHash, randomBytes, randomUUID, timingSafeEqual } from "node:crypto";\n', 'import { createHash, randomBytes, randomUUID, timingSafeEqual } from "node:crypto";\n\nimport { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n')
          replace(p, '\nexport const CONTRACT_SCHEMA_VERSION = 1 as const;\n', '\n')
          replace(p, 'readonly definitionVersion: 1;', 'readonly definitionVersion: typeof PHENIX_API_VERSION;')
          replace(p, 'readonly schemaVersion: typeof CONTRACT_SCHEMA_VERSION;', 'readonly schemaVersion: typeof PHENIX_API_VERSION;')
          replace(p, '\nexport const CONTRACT_RESULT_SCHEMA_VERSION = 2 as const;\n', '\n')
          replace(p, 'readonly schemaVersion: typeof CONTRACT_RESULT_SCHEMA_VERSION;', 'readonly schemaVersion: typeof PHENIX_API_VERSION;', expected=4)
          replace(p, 'schemaVersion: CONTRACT_SCHEMA_VERSION,', 'schemaVersion: PHENIX_API_VERSION,')
          replace(p, 'presetRevision: input.runtime.delegation.roles.presetRevision,', 'presetRevision: PHENIX_API_VERSION,')

          p = 'modules/phenix-pi/extensions/phenix-subagents/contract-store.ts'
          replace(p, 'import { atomicWriteJson, isErrno, readJsonFile } from "../phenix-persistence/json-files.ts";\n', 'import { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\nimport { atomicWriteJson, isErrno, readJsonFile } from "../phenix-persistence/json-files.ts";\n')
          replace(p, '    typeof value.contractId !== "string" ||\n', '    value.schemaVersion !== PHENIX_API_VERSION ||\n    typeof value.contractId !== "string" ||\n')
          replace(p, 'schemaVersion: 2,', 'schemaVersion: PHENIX_API_VERSION,', expected=5)

          p = 'modules/phenix-pi/extensions/phenix-subagents/contract-codec.ts'
          replace(p, 'import { CONTRACT_SCHEMA_VERSION, type ContractArtifact } from "./contract.ts";\n', 'import { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\nimport type { ContractArtifact } from "./contract.ts";\n')
          replace(p, 'raw.presetRevision !== 1', 'raw.presetRevision !== PHENIX_API_VERSION', expected=2)
          replace(p, 'raw.definitionVersion !== 1', 'raw.definitionVersion !== PHENIX_API_VERSION')
          replace(p, '''/**
 * Decode and validate a contract artifact.
 *
 * Rejects:
 * - contract versions 1-3 with a clear unsupported-version error.
 * - structurally invalid v4 artifacts with detailed errors.
 */''', '''/** Decode and validate the only supported contract artifact shape. */''')
          replace(p, 'value.schemaVersion !== 1', 'value.schemaVersion !== PHENIX_API_VERSION')
          replace(p, 'Expected ${CONTRACT_SCHEMA_VERSION}. This runtime does not support migration. ` +\n       `Delete .phenix-agent-state if it contains stale development artifacts.', 'Expected ${PHENIX_API_VERSION}. Remove stale .phenix-agent-state artifacts before retrying.')
          replace(p, '// ── Validate delegation section (v4) ──────────────────────────────────', '// ── Validate delegation section ───────────────────────────────────────')
          replace(p, '// ── Validate workflow section (v4) ────────────────────────────────────', '// ── Validate workflow section ─────────────────────────────────────────')

          # All preset projections use the same API version.
          p = 'modules/phenix-pi/extensions/phenix-subagents/tool-policy.ts'
          replace(p, 'import type { AgentRole } from "./agent-types.ts";\n', 'import { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\nimport type { AgentRole } from "./agent-types.ts";\n')
          replace(p, 'readonly presetRevision: 1;', 'readonly presetRevision: typeof PHENIX_API_VERSION;')
          replace(p, '''const FORBIDDEN_TOOLS = new Set([
  "subagent",
  "phenix_delegate",
  "phenix_contract_get",
  "phenix_contract_submit",
  "phenix_complete",
  "phenix_workflow",
  "phenix_create_subagent",
]);''', '''const FORBIDDEN_TOOLS = new Set([
  "subagent",
  "phenix_complete",
  "phenix_workflow",
]);''')
          replace(p, 'presetRevision: 1,', 'presetRevision: PHENIX_API_VERSION,')
          replace(p, '''  if (toolName === "subagent" || toolName === "phenix_delegate") return false;
  if (toolName === "phenix_complete" || toolName === "phenix_workflow") return true;
  if (toolName === "phenix_contract_get" || toolName === "phenix_contract_submit") {
    return false;
  }
''', '''  if (toolName === "subagent") return false;
  if (toolName === "phenix_complete" || toolName === "phenix_workflow") return true;
''')

          p = 'modules/phenix-pi/extensions/phenix-subagents/delegation-policy.ts'
          replace(p, 'import type { AgentRole, AgentKind } from "./agent-types.ts";\n', 'import { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\nimport type { AgentRole, AgentKind } from "./agent-types.ts";\n')
          replace(p, 'readonly presetRevision: 1;', 'readonly presetRevision: typeof PHENIX_API_VERSION;')
          replace(p, 'presetRevision: 1,', 'presetRevision: PHENIX_API_VERSION,')

          # Persisted handles use the same version gate; cumulative v5 language is removed.
          p = 'modules/phenix-pi/extensions/phenix-subagents/handle-types.ts'
          replace(p, 'import type { JsonSchema } from "../phenix-contracts/definitions.ts";\n', 'import type { JsonSchema } from "../phenix-contracts/definitions.ts";\nimport { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n')
          replace(p, '\nexport const HANDLE_VERSION = 5;\n', '\n')
          replace(p, '// ── Handle record (version 5) ───────────────────────────────────────────────', '// ── Handle record ───────────────────────────────────────────────────────────')
          replace(p, 'readonly version: typeof HANDLE_VERSION;', 'readonly version: typeof PHENIX_API_VERSION;')
          replace(p, '/** Workflow binding set when the handle was spawned through a v5 workflow transition. */', '/** Workflow binding set when the handle was spawned through a workflow transition. */')
          replace(p, '// ── Workflow binding (v5) ───────────────────────────────────────────────────', '// ── Workflow binding ────────────────────────────────────────────────────────')

          p = 'modules/phenix-pi/extensions/phenix-subagents/handle-store.ts'
          replace(p, 'import type { ExtensionContext } from "@earendil-works/pi-coding-agent";\n', 'import type { ExtensionContext } from "@earendil-works/pi-coding-agent";\n\nimport { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n')
          replace(p, 'import { HANDLE_VERSION } from "./handle-types.ts";\n', '')
          replace(p, 'value.version !== HANDLE_VERSION', 'value.version !== PHENIX_API_VERSION')
          replace(p, 'export { HANDLE_VERSION };\n', '')

          p = 'modules/phenix-pi/extensions/phenix-subagents/workflow-delegator.ts'
          replace(p, 'import type { AgentRole } from "../phenix-kernel/agents.ts";\n', 'import type { AgentRole } from "../phenix-kernel/agents.ts";\nimport { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n')
          replace(p, 'import { HANDLE_VERSION, isTerminalHandleStatus } from "./handle-types.ts";\n', 'import { isTerminalHandleStatus } from "./handle-types.ts";\n')
          replace(p, 'version: HANDLE_VERSION,', 'version: PHENIX_API_VERSION,')
          replace(p, 'definitionVersion: 1,', 'definitionVersion: PHENIX_API_VERSION,')
          text = read(p).replace('phenix_delegate:', 'phenix_workflow:')
          write(p, text)

          # Workflow definitions and records share the one version constant.
          p = 'modules/phenix-pi/extensions/phenix-workflow/workflow-types.ts'
          replace(p, 'import { type AgentKind, type AgentRole, isAgentKind } from "../phenix-kernel/agents.ts";\n', 'import { type AgentKind, type AgentRole, isAgentKind } from "../phenix-kernel/agents.ts";\nimport { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n')
          replace(p, 'readonly version: 1;', 'readonly version: typeof PHENIX_API_VERSION;', expected=2)
          replace(p, 'readonly definitionVersion: 1;', 'readonly definitionVersion: typeof PHENIX_API_VERSION;', expected=2)
          replace(p, 'readonly presetRevision: 1;', 'readonly presetRevision: typeof PHENIX_API_VERSION;')

          p = 'modules/phenix-pi/extensions/phenix-workflow/workflow-store.ts'
          replace(p, 'import type { AgentKind } from "../phenix-kernel/agents.ts";\n', 'import type { AgentKind } from "../phenix-kernel/agents.ts";\nimport { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n')
          replace(p, 'value.version !== 1', 'value.version !== PHENIX_API_VERSION')
          replace(p, 'version: 1,', 'version: PHENIX_API_VERSION,')
          replace(p, 'definitionVersion: 1,', 'definitionVersion: PHENIX_API_VERSION,')

          p = 'modules/phenix-pi/extensions/phenix-workflow/workflow-definitions.ts'
          replace(p, 'import { contractDefinitionRef } from "../phenix-kernel/refs.ts";\n', 'import { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\nimport { contractDefinitionRef } from "../phenix-kernel/refs.ts";\n')
          replace(p, 'version: 1,', 'version: PHENIX_API_VERSION,')

          # Remove the retired delegation-tool compatibility stack.
          p = 'modules/phenix-pi/extensions/phenix-subagents/role-presets.ts'
          replace(p, '''  "phenix_workflow",
  // Retained only as a preset-level codec identity for old direct artifacts.
  // Newly issued contracts explicitly remove it and live sessions filter it.
  "phenix_create_subagent",
''', '''  "phenix_workflow",
''')

          p = 'modules/phenix-pi/extensions/phenix-subagents/producer-contract.ts'
          regex(p, r'\nconst RETIRED_CREATION_TOOL = .*?\n\nfunction contractToolConfiguration\(.*?\n}\n', '\n', flags=re.S)
          replace(p, 'tools: contractToolConfiguration(input.spec.tools),', 'tools: input.spec.tools,')

          p = 'modules/phenix-pi/extensions/phenix-runtime/workflow-session-factory.ts'
          replace(p, 'const RETIRED_DELEGATION_TOOLS = new Set(["phenix_create_subagent", "phenix_delegate", "subagent"]);', 'const UNMANAGED_DELEGATION_TOOLS = new Set(["subagent"]);')
          replace(p, 'RETIRED_DELEGATION_TOOLS.has(tool)', 'UNMANAGED_DELEGATION_TOOLS.has(tool)', expected=2)
          replace(p, ''' * Lower-level policy code may still encounter retired names while old persisted
 * contracts are read. They never cross this boundary into a live Pi session.
''', ''' * Unmanaged delegation never crosses this boundary into a Phenix child session.
''')

          p = 'modules/phenix-pi/extensions/phenix-runtime/sdk-child-session-backend.ts'
          replace(p, ''' * Includes effective tools plus required runtime tools. `phenix_workflow` is
 * always installed; `phenix_create_subagent` is installed only when the loaded
 * contract retains delegation depth and at least one available role.
''', ''' * Includes effective task tools plus the current runtime-owned completion and
 * workflow capabilities. Unmanaged delegation is never exposed to a child.
''')
          regex(p, r'export function buildEffectiveToolNames\(spec: ChildSessionSpec\): readonly string\[\] \{.*?\n}\n', '''export function buildEffectiveToolNames(spec: ChildSessionSpec): readonly string[] {
  const runtimeTools = new Set(["subagent", "phenix_complete", "phenix_workflow"]);
  const baseTools = spec.effectiveTools.filter((tool) => !runtimeTools.has(tool));

  return [...new Set([...baseTools, "phenix_complete", "phenix_workflow"])].sort();
}
''', flags=re.S)

          p = 'modules/phenix-pi/extensions/phenix-subagents/index.ts'
          replace(p, '''    if (toolName === "subagent" || toolName === "phenix_delegate") {
      return {
        blocked: true,
        reason:
          "Raw or legacy delegation is runtime-blocked in Phenix sessions. Use phenix_workflow with action=spawn, one target agent advertised in the preloaded authority snapshot, and a bounded task.",
      };
    }

    if (toolName === "phenix_contract_get" || toolName === "phenix_contract_submit") {
      return {
        blocked: true,
        reason: `Tool "${toolName}" is no longer available. Use phenix_complete to submit your result.`,
      };
    }
''', '''    if (toolName === "subagent") {
      return {
        blocked: true,
        reason:
          "Unmanaged delegation is runtime-blocked in Phenix sessions. Use phenix_workflow with action=spawn, one target agent advertised in the preloaded authority snapshot, and a bounded task.",
      };
    }
''')
          replace(p, '// Raw and legacy delegation are blocked only for directly selected Phenix', '// Unmanaged delegation is blocked only for directly selected Phenix')

          p = 'modules/phenix-pi/extensions/phenix-skill-bootstrap.ts'
          replace(p, 'Raw `subagent` and legacy `phenix_delegate` are runtime-blocked.', 'Raw `subagent` is runtime-blocked.')

          p = 'modules/phenix-pi/extensions/phenix-kernel/agents.ts'
          replace(p, '/** Null means the base/no-role execution client in the legacy runtime protocol. */', '/** Null means the base/no-role execution client. */')

          p = 'modules/phenix-pi/extensions/phenix-routing/default-routing.ts'
          replace(p, '// ── Agent routes (formerly ROLE_MATRIX) ────────────────────────────────────', '// ── Agent routes ────────────────────────────────────────────────────────────')

          # Current-only test fixtures.
          write('modules/phenix-pi/tests/workflow-api-init.test.ts', '''import assert from "node:assert/strict";
          import { describe, it } from "node:test";

          import type { ChildSessionSpec } from "../extensions/phenix-runtime/child-session-types.ts";
          import { buildEffectiveToolNames } from "../extensions/phenix-runtime/sdk-child-session-backend.ts";
          import { normalizeWorkflowRuntimeToolNames } from "../extensions/phenix-runtime/workflow-session-factory.ts";

          function spec(): ChildSessionSpec {
            return {
              effectiveTools: ["read", "subagent", "phenix_workflow", "phenix_complete"],
            } as unknown as ChildSessionSpec;
          }

          describe("workflow API session initialization", () => {
            it("installs only the current runtime capabilities", () => {
              const tools = normalizeWorkflowRuntimeToolNames(buildEffectiveToolNames(spec()));

              assert.deepEqual(tools, ["phenix_complete", "phenix_workflow", "read"]);
              assert.equal(tools.includes("subagent"), false);
            });
          });
          '''.replace('          ', ''))

          write('modules/phenix-pi/tests/handle-schema.test.ts', '''import assert from "node:assert/strict";
          import { describe, it } from "node:test";

          import { PHENIX_API_VERSION } from "../extensions/phenix-kernel/api-version.ts";
          import { decodeHandleRecord } from "../extensions/phenix-subagents/handle-store.ts";

          function persistedHandle(version: number): Record<string, unknown> {
            const timestamp = new Date().toISOString();
            return {
              version,
              id: "schema-test",
              sessionId: "schema-session",
              modelSet: "mixed",
              assignment: {},
              producerSpec: {},
              producerCycles: [],
              createdAt: timestamp,
              updatedAt: timestamp,
              status: "running",
            };
          }

          describe("persisted handle schema", () => {
            it("accepts only the current Phenix API version", () => {
              assert.equal(
                decodeHandleRecord(persistedHandle(PHENIX_API_VERSION)).version,
                PHENIX_API_VERSION,
              );
              assert.throws(
                () => decodeHandleRecord(persistedHandle(PHENIX_API_VERSION + 1)),
                /unsupported version/,
              );
            });
          });
          '''.replace('          ', ''))

          # Remove assertions and fixtures whose only purpose was preserving retired names.
          for p in [
              'modules/phenix-pi/tests/workflow-api-prompt.test.ts',
              'modules/phenix-pi/tests/phenix-skill-bootstrap.test.ts',
              'modules/phenix-pi/tests/contract.test.ts',
              'modules/phenix-pi/tests/contract-store.test.ts',
              'modules/phenix-pi/tests/execution-quality-service.test.ts',
              'modules/phenix-pi/tests/contract-tool-isolation.test.ts',
          ]:
              text = read(p)
              text = '\n'.join(line for line in text.splitlines() if 'phenix_create_subagent' not in line) + '\n'
              write(p, text)

          p = 'modules/phenix-pi/tests/tool-policy.test.ts'
          text = read(p)
          for title in [
              'phenix_contract_get is rejected',
              'phenix_contract_submit is rejected',
              'old contract tools are always blocked',
              'childLaunchTools does not include old contract tools',
          ]:
              text, count = re.subn(rf'\n  it\("{re.escape(title)}".*?\n  \}}\);', '', text, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'{p}: failed to remove test {title!r}; matches={count}')
          write(p, text)

          p = 'modules/phenix-pi/tests/role-presets.test.ts'
          regex(p, r'\n  it\("common read tools do not include old contract tools".*?\n  \}\);', '', flags=re.S)

          p = 'modules/phenix-pi/tests/contract.test.ts'
          text = read(p).replace('const v4 =', 'const runtimeParts =').replace('v4.delegation', 'runtimeParts.delegation').replace('v4.workflow', 'runtimeParts.workflow')
          write(p, text)

          # Obsolete demonstrations described APIs that no longer exist.
          for p in ['tests/delegate-demo.md', 'tests/delegate-flow-test.sh']:
              (root / p).unlink()

          # The staging workflow must not remain in repository history after this commit.
          (root / '.github/workflows/apply-single-api-cleanup.yml').unlink()
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(api): keep only the current Phenix API"
          git push origin HEAD:cleanup/single-phenix-api

      - name: Reject stale API references
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'phenix_delegate|phenix_create_subagent|phenix_contract_get|phenix_contract_submit|\bv[1-9][0-9]*\b|version [2-9][0-9]*' \
            --exclude='flake.lock' --exclude='package-lock.json' --exclude-dir='.git' .; then
            echo 'Stale Phenix API reference found.' >&2
            exit 1
          fi

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tend CI profile
        shell: bash
        run: |
          nix develop --command tend check \
            --profile ci \
            --context ci \
            --base HEAD^ \
            --head HEAD
