name: Patch automatic dispatch v2

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: feat/enforced-workflow-dispatch
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Apply corrected automatic dispatch patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path(".github/workflows/patch-auto-dispatch.yml").read_text()
          marker = "          python - <<'PY'\n"
          script = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          script = textwrap.dedent(script)
          script = script.replace(
              "              replacement,\n              source,",
              "              lambda _match: replacement,\n              source,",
              1,
          )
          exec(compile(script, "patch-auto-dispatch", "exec"))
          PY
      - name: Format changed source
        run: |
          nix shell github:NixOS/nixpkgs/0bb7ec54c8483066ec9d7720e780a5caa71f8612#biome -c \
            biome check --write --unsafe --config-path biome.json --no-errors-on-unmatched \
            --files-ignore-unknown=true modules/phenix-pi || true
      - name: Commit automatic dispatch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/phenix-pi
          git commit -m "feat: auto-dispatch explicit workflow intents"
          git push origin HEAD:feat/enforced-workflow-dispatch
