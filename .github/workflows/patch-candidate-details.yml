name: Patch preserved candidate details

on:
  push:
    branches:
      - fix/runtime-diagnostics-journal-full

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/runtime-diagnostics-journal-full
          fetch-depth: 0
      - name: Expose preserved producer evidence to parent
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('modules/phenix-pi/packages/phenix-suite/subagents/workflow-delegator.ts')
          text = path.read_text()
          old = '''            handleId: execution.record.id,
            status: execution.record.status,
            errors: execution.record.errors,
'''
          new = '''            handleId: execution.record.id,
            status: execution.record.status,
            errors: execution.record.errors,
            ...(execution.record.candidateValue !== undefined
              ? { candidateValue: execution.record.candidateValue }
              : {}),
            ...(execution.record.verification
              ? { verification: execution.record.verification }
              : {}),
            ...(execution.record.assuranceFailure
              ? { assuranceFailure: execution.record.assuranceFailure }
              : {}),
'''
          if text.count(old) != 1:
              raise SystemExit('expected workflow failure details block exactly once')
          path.write_text(text.replace(old, new))
          Path('.github/workflows/patch-candidate-details.yml').unlink()
          Path('.candidate-details-trigger').unlink(missing_ok=True)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: return preserved producer evidence to parent"
          git push origin HEAD:fix/runtime-diagnostics-journal-full
