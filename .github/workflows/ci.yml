name: Apply subagent SDK patch

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/subagent-tools-task-tree'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - name: Apply final source and test fixes
        run: |
          set -euo pipefail
          python3 tools/apply-subagent-sdk-fix.py
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .subagent-sdk-fix-trigger tools/apply-subagent-sdk-fix.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: align subagent tools with Pi SDK contracts"
          git push origin HEAD:${{ github.head_ref }}
