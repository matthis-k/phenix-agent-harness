name: Normalize routing authority changes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out routing branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/02-routing-authority
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply deterministic TypeScript fixes
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix-routing/config.ts \
            modules/phenix-pi/extensions/phenix-routing/matrix.ts \
            modules/phenix-pi/extensions/phenix-routing/types.ts \
            modules/phenix-pi/tests/routing-authority.test.ts

      - name: Commit normalized source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            modules/phenix-pi/extensions/phenix-routing/config.ts \
            modules/phenix-pi/extensions/phenix-routing/matrix.ts \
            modules/phenix-pi/extensions/phenix-routing/types.ts \
            modules/phenix-pi/tests/routing-authority.test.ts
          git diff --cached --check
          git commit -m "style(routing): normalize declaration projections"
          git push origin HEAD:qa/02-routing-authority
