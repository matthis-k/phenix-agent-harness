name: Fix persistence static checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out persistence branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/08-persistence-boundaries
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Remove unsafe contract-store assertion
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("modules/phenix-pi/extensions/phenix-subagents/contract-store.ts")
          content = path.read_text()
          old = "      resolve!();"
          if content.count(old) != 1:
              raise RuntimeError(f"expected one resolve assertion, found {content.count(old)}")
          path.write_text(content.replace(old, "      resolve?.();", 1))
          PY

      - name: Format touched files
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix-subagents/contract-store.ts \
            modules/phenix-pi/tests/workflow-store.test.ts

      - name: Commit source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            modules/phenix-pi/extensions/phenix-subagents/contract-store.ts \
            modules/phenix-pi/tests/workflow-store.test.ts
          git diff --cached --check
          git commit -m "refactor(persistence): remove unsafe boundary assertions"
          git push origin HEAD:qa/08-persistence-boundaries
