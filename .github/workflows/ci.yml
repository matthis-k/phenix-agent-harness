name: CI

on:
  push:
    branches:
      - fix/subagent-tools-task-tree

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/subagent-tools-task-tree
          fetch-depth: 0
      - name: Apply staged implementation
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/implement-subagent-tools.yml').read_text().splitlines()
          start = next(index for index, line in enumerate(source) if line.strip() == 'run: |') + 1
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:])
          Path('/tmp/implement-subagent-tools.sh').write_text(script + '\n')
          PY
          git checkout origin/main -- .github/workflows/ci.yml
          bash /tmp/implement-subagent-tools.sh
