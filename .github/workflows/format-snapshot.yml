name: Format snapshot

on:
  push:
    branches: [complete-clean-architecture]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: format-snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with: { fetch-depth: 0 }
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v17
        with: { name: devenv }
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Format source snapshot
        run: devenv shell -- biome check --write modules/phenix-pi
      - name: Pack formatted source
        run: tar -czf formatted-source.tar.gz modules/phenix-pi
      - uses: actions/upload-artifact@v4
        with:
          name: formatted-source
          path: formatted-source.tar.gz
          if-no-files-found: error
