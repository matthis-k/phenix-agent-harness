name: Apply typed runtime lifecycle cleanup

on:
  push:
    branches:
      - qa/01-runtime-lifecycle
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out maintenance branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/01-runtime-lifecycle
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply typed source transformation
        id: transform
        shell: bash
        run: |
          set +e
          python .github/maintenance/fix-types.py > transform.log 2>&1
          status=$?
          cat transform.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload transformation diagnostics
        if: steps.transform.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: lifecycle-transform-diagnostics
          path: transform.log
          if-no-files-found: error

      - name: Fail when transformation fails
        if: steps.transform.outputs.status != '0'
        run: exit 1

      - name: Apply deterministic TypeScript formatting
        if: steps.transform.outputs.status == '0'
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix.ts \
            modules/phenix-pi/extensions/phenix-runtime/child-session-types.ts \
            modules/phenix-pi/extensions/phenix-subagents/coordinator.ts \
            modules/phenix-pi/extensions/phenix-workflow/workflow-runtime.ts

      - name: Commit transformed source files
        if: steps.transform.outputs.status == '0'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            modules/phenix-pi/extensions/phenix.ts \
            modules/phenix-pi/extensions/phenix-runtime/child-session-types.ts \
            modules/phenix-pi/extensions/phenix-subagents/coordinator.ts \
            modules/phenix-pi/extensions/phenix-workflow/workflow-runtime.ts
          git diff --cached --check
          git commit -m "refactor(runtime): replace unsafe lifecycle casts"
          git push origin HEAD:qa/01-runtime-lifecycle
