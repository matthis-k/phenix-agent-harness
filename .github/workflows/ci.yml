name: CI

on:
  pull_request:
  push:
    branches:
      - fix/subagent-tools-task-tree

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/subagent-tools-task-tree
          fetch-depth: 0
          show-progress: false
      - name: Patch skipped diagnostics
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          sdk = Path('modules/phenix-pi/packages/phenix-suite/runtime/sdk-child-session-backend.ts')
          text = sdk.read_text()
          start_marker = '      (error) => {\n        if (!preflightSeen) reject(error);'
          start = text.index(start_marker)
          end = text.index('      },\n    );', start) + len('      },')
          replacement = '''      (error) => {
            const providerMessage = this.lastProviderFailure?.message;
            const message =
              providerMessage ?? (error instanceof Error ? error.message : String(error));
            const providerError = new ChildRuntimeError("PROVIDER_FAILED", message, {
              cause: error,
            });
            if (!preflightSeen) reject(providerError);
            void this.failAndAbort(providerError);
          },'''
          sdk.write_text(text[:start] + replacement + text[end:])

          delegator = Path('modules/phenix-pi/packages/phenix-suite/subagents/workflow-delegator.ts')
          text = delegator.read_text()
          marker = '            status: execution.record.status,\n'
          index = text.index(marker, text.index('code: execution.error.code')) + len(marker)
          if 'errors: execution.record.errors' not in text[index:index + 80]:
              text = text[:index] + '            errors: execution.record.errors,\n' + text[index:]
          delegator.write_text(text)
          PY
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: preserve child provider diagnostics"
          git pull --rebase origin fix/subagent-tools-task-tree
          git push origin HEAD:fix/subagent-tools-task-tree
