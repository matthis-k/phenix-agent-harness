name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/contract-workflow-api
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Tend CI profile
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove final workflow API lint warnings
        if: (github.ref_name == 'feat/contract-workflow-api' || github.head_ref == 'feat/contract-workflow-api') && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("modules/phenix-pi/extensions/phenix-subagents/policy.ts"): [
                  ('  AGENT_KINDS,\n', ''),
              ],
              Path("modules/phenix-pi/tests/contract.test.ts"): [
                  ('import type { WorkflowTransitionId } from "../extensions/phenix-workflow/workflow-types.ts";\n', ''),
                  ('import { mkTransitionId } from "../extensions/phenix-workflow/workflow-types.ts";\n', ''),
              ],
              Path("modules/phenix-pi/tests/tool-policy.test.ts"): [
                  ('import type { AgentRole } from "../extensions/phenix-subagents/agent-types.ts";\n', ''),
                  ('  type ToolPatchInput,\n', ''),
              ],
          }
          for path, edits in replacements.items():
              text = path.read_text()
              for old, new in edits:
                  text = text.replace(old, new)
              path.write_text(text)
          PY
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix-subagents/policy.ts \
            modules/phenix-pi/tests/contract.test.ts \
            modules/phenix-pi/tests/tool-policy.test.ts
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "style(workflow): remove final lint warnings"
          git push origin HEAD:${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}

      - name: Run read-only Tend CI profile
        id: tend
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set +e
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$HEAD_SHA^"
          fi
          nix develop --command tend check \
            --profile ci \
            --context ci \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            > tend-ci.log 2>&1
          status=$?
          cat tend-ci.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Tend diagnostics
        if: steps.tend.outputs.status != '0'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097 # v4.4.2
        with:
          name: tend-ci-diagnostics
          path: tend-ci.log
          if-no-files-found: error

      - name: Fail when Tend checks fail
        if: steps.tend.outputs.status != '0'
        run: exit 1
