name: Apply repository formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    name: Apply formatted sources
    if: github.head_ref == 'feat/unified-execution-authority'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.head_ref }}
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Apply repository formatter
        run: |
          set +e
          devenv tasks run maintenance:fix:format
          exit 0
      - name: Commit formatter output
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add biome.json modules/phenix-pi
          git commit -m "style: apply repository formatter"
          git push origin HEAD:${{ github.head_ref }}
