name: Format PR 98

on:
  push:
    branches:
      - fix/runtime-diagnostics-journal-full

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/runtime-diagnostics-journal-full
          fetch-depth: 0
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Apply formatters
        shell: bash
        run: |
          nix shell nixpkgs#biome nixpkgs#nixfmt nixpkgs#statix --command bash -euo pipefail -c '
            statix fix
            find . -type f -name "*.nix" -not -path "./.git/*" -not -path "./.devenv/*" -not -path "*/node_modules/*" -exec nixfmt {} +
            biome check --write --no-errors-on-unmatched --files-ignore-unknown=true biome.json modules
          '
          rm .github/workflows/format-pr98.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply deterministic repository formatting"
          git push origin HEAD:fix/runtime-diagnostics-journal-full
