name: Run runtime diagnostics patch

on:
  push:
    branches:
      - fix/runtime-diagnostics-journal-full

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: fix/runtime-diagnostics-journal-full
          fetch-depth: 0
      - name: Extract and apply staged patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-runtime-diagnostics-patch.yml')
          text = workflow.read_text()
          marker = "          python3 <<'PY'\n"
          start = text.index(marker) + len(marker)
          end = text.index("\n          PY", start)
          block = text[start:end]
          script = "\n".join(
              line[10:] if line.startswith("          ") else line
              for line in block.splitlines()
          )
          exec(compile(script, str(workflow), 'exec'))
          PY
          rm -f .github/workflows/run-runtime-patch.yml .patch-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden child failures and add merged journals"
          git push origin HEAD:fix/runtime-diagnostics-journal-full
