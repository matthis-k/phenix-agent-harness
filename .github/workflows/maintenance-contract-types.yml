name: Apply contract runtime type cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out contract branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/03-contract-authority
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply deterministic type cleanup
        run: python .github/maintenance/fix-contract-types.py

      - name: Format contract source files
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix-contracts/definitions.ts \
            modules/phenix-pi/extensions/phenix-contracts/index.ts \
            modules/phenix-pi/extensions/phenix-contracts/validator.ts \
            modules/phenix-pi/extensions/phenix-runtime/completion-tool.ts \
            modules/phenix-pi/extensions/phenix-subagents/attempt-runner.ts

      - name: Commit source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            modules/phenix-pi/extensions/phenix-contracts/definitions.ts \
            modules/phenix-pi/extensions/phenix-contracts/index.ts \
            modules/phenix-pi/extensions/phenix-contracts/validator.ts \
            modules/phenix-pi/extensions/phenix-runtime/completion-tool.ts \
            modules/phenix-pi/extensions/phenix-subagents/attempt-runner.ts
          git diff --cached --check
          git commit -m "refactor(contracts): remove unsafe runtime casts"
          git push origin HEAD:qa/03-contract-authority
