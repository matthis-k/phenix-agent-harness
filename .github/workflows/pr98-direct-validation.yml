name: PR 98 direct validation

on:
  push:
    branches:
      - fix/runtime-diagnostics-journal-full

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with: { fetch-depth: 0 }
      - uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
      - name: Runtime tests including packaged RPC smoke
        run: nix build --no-link --print-build-logs .#phenix-runtime-tests
      - name: Typecheck
        run: nix build --no-link --print-build-logs .#phenix-typecheck
      - name: Format and statix
        shell: bash
        run: |
          nix shell nixpkgs#biome nixpkgs#nixfmt nixpkgs#statix --command bash -euo pipefail -c '
            find . -type f -name "*.nix" -not -path "./.git/*" -not -path "./.devenv/*" -not -path "*/node_modules/*" -exec nixfmt --check {} +
            biome ci --config-path biome.json --no-errors-on-unmatched --files-ignore-unknown=true --error-on-warnings biome.json modules
            statix check --ignore ".git/**"
          '
