name: Patch running activity line

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feat/running-activity-line'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply compact activity layout
        run: |
          python3 <<'PY'
          from pathlib import Path

          monitor = Path('modules/phenix-pi/extension/run-monitor.ts')
          text = monitor.read_text()
          old = '''  const details = [modelDetails(node, theme)];
          if (collapsed) details.push(collapsedDetails(node, theme));
          if (!isTerminal(node.run.state) && node.activity) details.push(activityDetails(node, theme));
          const suffix = details.filter(Boolean).join(color(theme, "dim", "  ·  "));
          lines.push(
            `${color(theme, "dim", `${prefix}${branch}`)}${symbol} ${label} ${stateLabel}${
              suffix ? `  ${suffix}` : ""
            }`,
          );
          if (collapsed) return;
          const childPrefix = `${prefix}${last ? "   " : "│  "}`;
          node.children.forEach((child, index) => {
          '''
          new = '''  const details = [modelDetails(node, theme)];
          if (collapsed) details.push(collapsedDetails(node, theme));
          const suffix = details.filter(Boolean).join(color(theme, "dim", "  ·  "));
          lines.push(
            `${color(theme, "dim", `${prefix}${branch}`)}${symbol} ${label} ${stateLabel}${
              suffix ? `  ${suffix}` : ""
            }`,
          );
          if (collapsed) return;
          const childPrefix = `${prefix}${last ? "   " : "│  "}`;
          if (node.run.state === "running" && node.activity) {
            lines.push(`${color(theme, "dim", childPrefix)}${activityDetails(node, theme)}`);
          }
          node.children.forEach((child, index) => {
          '''
          if old not in text:
              raise SystemExit('run-monitor activity block not found')
          monitor.write_text(text.replace(old, new, 1))

          tests = Path('modules/phenix-pi/tests/run-monitor.test.ts')
          text = tests.read_text()
          marker = '''test("status uses one compact row per run, collapses completed subtrees, and keeps recent facts", () => {
          '''
          addition = '''test("running nodes render current activity on a separate indented line", () => {
            const childId = runId("run-active-scout");
            const lines = renderDashboard({
              tree: {
                root: {
                  run: snapshot(ROOT, undefined, "root.session"),
                  children: [
                    {
                      run: {
                        ...snapshot(childId, ROOT, "agent.scout"),
                        resolvedModel: {
                          requested: { kind: "session" },
                          concrete: {
                            kind: "concrete",
                            provider: "opencode-go",
                            model: "model-a",
                          },
                          thinking: "low",
                          policyRevision: "test",
                        },
                      },
                      activity: {
                        rootRunId: ROOT,
                        runId: childId,
                        phase: "exploring",
                        summary: "Inspecting workflow scheduler",
                        target: "application/workflow-process-manager.ts",
                        source: "reported",
                        since: "2026-07-24T00:00:10.000Z",
                        sequence: 2,
                      },
                      children: [],
                    },
                  ],
                },
              },
              facts: [],
              sequence: 3,
              profile: { agent: "base", modelSet: "mixed", difficulty: "D1" },
              diagnostics: DIAGNOSTICS,
              integrations: "5/5 loaded",
              integrationsFailed: false,
              expanded: false,
            });

            const rowIndex = lines.findIndex((line) => line.includes("scout [running]"));
            assert.notEqual(rowIndex, -1);
            const row = lines[rowIndex];
            const activity = lines[rowIndex + 1];
            assert.ok(row);
            assert.ok(activity);
            assert.match(row, /opencode-go\\/model-a · low/);
            assert.doesNotMatch(row, /Inspecting workflow scheduler/);
            assert.match(activity, /! exploring Inspecting workflow scheduler/);
            assert.match(activity, /workflow-process-manager\\.ts/);
          });

          '''
          if marker not in text:
              raise SystemExit('run-monitor test insertion marker not found')
          tests.write_text(text.replace(marker, addition + marker, 1))

          docs = Path('modules/phenix-pi/OBSERVABILITY.md')
          text = docs.read_text()
          old = 'Every visible agent or workflow occupies one row containing its semantic role, state, dimmed concrete provider/model and thinking level, and current activity when the run is active.'
          new = 'Every visible agent or workflow occupies one compact summary row containing its semantic role, state, and dimmed concrete provider/model and thinking level. A running node with current activity may add one indented bounded description line beneath its summary.'
          if old not in text:
              raise SystemExit('observability documentation sentence not found')
          docs.write_text(text.replace(old, new, 1))

          agents = Path('AGENTS.md')
          text = agents.read_text()
          old = '- The compact status tree omits the synthetic root row and renders one row per visible agent or workflow: role, state, dimmed concrete model/thinking metadata, and bounded current activity.'
          new = '- The compact status tree omits the synthetic root row and renders one summary row per visible agent or workflow: role, state, and dimmed concrete model/thinking metadata. Running nodes may add one indented bounded activity-description line.'
          if old not in text:
              raise SystemExit('AGENTS observability sentence not found')
          agents.write_text(text.replace(old, new, 1))
          PY
      - name: Remove temporary workflow
        run: rm .github/workflows/patch-running-activity-line.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/phenix-pi/extension/run-monitor.ts modules/phenix-pi/tests/run-monitor.test.ts modules/phenix-pi/OBSERVABILITY.md AGENTS.md .github/workflows/patch-running-activity-line.yml
          git commit -m "Show running activity on a second line"
          git push origin HEAD:${{ github.head_ref }}
