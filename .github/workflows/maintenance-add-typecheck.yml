name: Apply TypeScript compiler check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out type branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/05-types-and-identifiers
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Add compiler target
        run: python .github/maintenance/add-typecheck.py

      - name: Format build and hook files
        run: |
          nix run nixpkgs#nixfmt -- modules/pi-packages.nix
          nix run nixpkgs#shfmt -- -w -i 2 -ci scripts/check.sh

      - name: Commit source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/pi-packages.nix modules/phenix-pi/tsconfig.json scripts/check.sh
          git diff --cached --check
          git commit -m "build(types): add compiler check"
          git push origin HEAD:qa/05-types-and-identifiers
