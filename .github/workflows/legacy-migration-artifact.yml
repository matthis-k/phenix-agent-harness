name: Legacy migration artifact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  migrate:
    name: Generate canonical import migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Rewrite legacy Phenix imports
        run: node scripts/migrate-legacy-phenix-imports.mjs
      - name: Upload migration tree
        uses: actions/upload-artifact@v4
        with:
          name: canonical-import-migration
          path: /tmp/phenix-canonical-migration
          if-no-files-found: error
