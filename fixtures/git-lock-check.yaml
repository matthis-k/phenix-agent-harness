# Test fixtures for flake lock / gitlink invariant checks

cases:
  - id: lock-check-all-ok
    repos:
      - name: phenix-pins
        root_gitlink_rev: "abc123"
        checked_out_rev: "abc123"
        flake_lock_rev: "abc123"
        remote_contains_gitlink_rev: true
        remote_contains_lock_rev: true
        expected_status: ok
    notes: All revs match and are available on remote.

  - id: lock-check-gitlink-mismatch
    repos:
      - name: phenix-pins
        root_gitlink_rev: "abc123"
        checked_out_rev: "def456"
        flake_lock_rev: "abc123"
        expected_status: gitlink_mismatch
    notes: Root gitlink differs from checked out submodule rev.

  - id: lock-check-lock-mismatch
    repos:
      - name: phenix-pins
        root_gitlink_rev: "abc123"
        checked_out_rev: "abc123"
        flake_lock_rev: "def456"
        expected_status: lock_mismatch
    notes: flake.lock rev differs from root gitlink rev.

  - id: lock-check-remote-missing-lock
    repos:
      - name: phenix-pins
        root_gitlink_rev: "abc123"
        checked_out_rev: "abc123"
        flake_lock_rev: "def456"
        remote_contains_gitlink_rev: true
        remote_contains_lock_rev: false
        expected_status: remote_missing_lock_rev
    notes: flake.lock references a commit not available on remote.

  - id: lock-check-remote-missing-gitlink
    repos:
      - name: phenix-pins
        root_gitlink_rev: "abc123"
        checked_out_rev: "abc123"
        flake_lock_rev: "abc123"
        remote_contains_gitlink_rev: false
        expected_status: remote_missing_gitlink_rev
    notes: Root gitlink references a commit not available on remote.
