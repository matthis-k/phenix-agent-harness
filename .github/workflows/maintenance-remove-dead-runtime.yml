name: Apply dead runtime cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: qa/04-remove-dead-runtime
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31

      - name: Apply deterministic cleanup
        run: python .github/maintenance/remove-dead-runtime.py

      - name: Format touched TypeScript
        run: |
          nix run nixpkgs#biome -- check --write \
            modules/phenix-pi/extensions/phenix.ts \
            modules/phenix-pi/extensions/phenix-composition/configuration.ts \
            modules/phenix-pi/extensions/phenix-runtime/child-session-backend.ts \
            modules/phenix-pi/extensions/phenix-runtime/child-session-types.ts \
            modules/phenix-pi/extensions/phenix-subagents/handle-store.ts

      - name: Commit source files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add modules/phenix-pi
          git diff --cached --check
          git commit -m "refactor(runtime): remove disabled backend and dead store APIs"
          git push origin HEAD:qa/04-remove-dead-runtime
