name: Run staged single API cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Execute staged transformation
        id: transform
        shell: bash
        run: |
          set +e
          python3 > cleanup-error.log 2>&1 <<'PY'
          from pathlib import Path
          import re

          workflow = Path('.github/workflows/apply-single-api-cleanup.yml').read_text()
          marker = "          python3 <<'PY'\n"
          body = workflow.split(marker, 1)[1].split("\n          PY", 1)[0]
          body = "\n".join(line[10:] if line.startswith("          ") else line for line in body.splitlines())
          body = "\n".join(
              line for line in body.splitlines()
              if "Expected ${CONTRACT_SCHEMA_VERSION}" not in line
              and "contractDefinitionRef" not in line
          )
          body = body.replace(
              "replace(p, 'definitionVersion: 1,', 'definitionVersion: PHENIX_API_VERSION,')",
              "replace(p, 'definitionVersion: 1,', 'definitionVersion: PHENIX_API_VERSION,', expected=2)",
              1,
          )
          body = body.replace(
              "replace(p, 'RETIRED_DELEGATION_TOOLS.has(tool)', 'UNMANAGED_DELEGATION_TOOLS.has(tool)', expected=2)",
              "replace(p, 'RETIRED_DELEGATION_TOOLS.has(tool)', 'UNMANAGED_DELEGATION_TOOLS.has(tool)')",
          )

          index_section_start = "\np = 'modules/phenix-pi/extensions/phenix-subagents/index.ts'\n"
          index_section_end = "\np = 'modules/phenix-pi/extensions/phenix-skill-bootstrap.ts'\n"
          start = body.index(index_section_start)
          end = body.index(index_section_end, start)
          current_block = (
              '    if (toolName === "subagent") {\n'
              '      return {\n'
              '        blocked: true,\n'
              '        reason:\n'
              '          "Unmanaged delegation is runtime-blocked in Phenix sessions. Use phenix_workflow with action=spawn, one target agent advertised in the preloaded authority snapshot, and a bounded task.",\n'
              '      };\n'
              '    }\n'
          )
          index_replacement = "\n".join([
              "p = 'modules/phenix-pi/extensions/phenix-subagents/index.ts'",
              "text = read(p)",
              "start_marker = '    if (toolName === \\\"subagent\\\" || toolName === \\\"phenix_delegate\\\") {'",
              "end_marker = '  });'",
              "block_start = text.index(start_marker)",
              "block_end = text.index(end_marker, block_start)",
              f"current_block = {current_block!r}",
              "text = text[:block_start] + current_block + text[block_end:]",
              "text = text.replace(",
              "    '// Raw and legacy delegation are blocked only for directly selected Phenix',",
              "    '// Unmanaged delegation is blocked only for directly selected Phenix',",
              ")",
              "write(p, text)",
              "",
          ])
          body = body[:start] + "\n" + index_replacement + body[end:]

          exec(compile(body, 'staged-single-api-cleanup.py', 'exec'))

          codec_path = Path('modules/phenix-pi/extensions/phenix-subagents/contract-codec.ts')
          codec = codec_path.read_text()
          codec, count = re.subn(
              r'`Expected \$\{CONTRACT_SCHEMA_VERSION\}\. This runtime does not support migration\. ` \+\n\s*`Delete \.phenix-agent-state if it contains stale development artifacts\.`,',
              '`Expected ${PHENIX_API_VERSION}. Remove stale .phenix-agent-state artifacts before retrying.`,',
              codec,
          )
          if count != 1:
              raise RuntimeError(f'contract codec version message matches={count}')
          codec_path.write_text(codec)

          definitions_path = Path('modules/phenix-pi/extensions/phenix-workflow/workflow-definitions.ts')
          definitions = definitions_path.read_text()
          old_import = 'import { agentClientRef, contractRef } from "../phenix-kernel/refs.ts";\n'
          if definitions.count(old_import) != 1:
              raise RuntimeError('workflow definition refs import was not unique')
          definitions = definitions.replace(
              old_import,
              'import { PHENIX_API_VERSION } from "../phenix-kernel/api-version.ts";\n' + old_import,
          )
          definitions_path.write_text(definitions)

          factory_path = Path('modules/phenix-pi/extensions/phenix-runtime/workflow-session-factory.ts')
          factory = factory_path.read_text()
          old_filter = 'RETIRED_DELEGATION_TOOLS.has(tool.name)'
          if factory.count(old_filter) != 1:
              raise RuntimeError('custom tool delegation filter was not unique')
          factory_path.write_text(factory.replace(old_filter, 'UNMANAGED_DELEGATION_TOOLS.has(tool.name)'))
          PY
          status=$?
          cat cleanup-error.log
          exit "$status"
      - name: Upload transformation failure
        if: failure() && steps.transform.conclusion == 'failure'
        uses: actions/upload-artifact@84480863f228bb9747b473957fcc9e309aa96097
        with:
          name: cleanup-error
          path: cleanup-error.log
          if-no-files-found: error
      - name: Commit transformation
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -f cleanup-error.log .github/workflows/run-single-api-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "refactor(api): keep only the current Phenix API"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - name: Reject stale API references
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE 'phenix_delegate|phenix_create_subagent|phenix_contract_get|phenix_contract_submit|\bv[1-9][0-9]*\b|version [2-9][0-9]*' \
            --exclude='flake.lock' --exclude='package-lock.json' --exclude-dir='.git' .; then
            echo 'Stale Phenix API reference found.' >&2
            exit 1
          fi
      - name: Install Nix
        if: success()
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Tend CI profile
        if: success()
        shell: bash
        run: |
          nix develop --command tend check \
            --profile ci \
            --context ci \
            --base HEAD^ \
            --head HEAD
